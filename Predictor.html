<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PredictFoot Pro</title>

<style>
:root {
  --bg: #0b0f17;
  --card: #111827;
  --card-2: #1f2937;
  --text: #f9fafb;
  --muted: #9ca3af;
  --accent: #3b82f6;
  --success: #22c55e;
  --radius: 16px;
}

body.light {
  --bg: #f9fafb;
  --card: #ffffff;
  --card-2: #f3f4f6;
  --text: #111827;
  --muted: #6b7280;
  --accent: #2563eb;
  --success: #16a34a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
  transition: all 0.25s ease;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.title {
  font-size: 1.8rem;
  font-weight: bold;
}

.theme-btn {
  background: var(--card-2);
  border: none;
  padding: 10px 14px;
  border-radius: var(--radius);
  cursor: pointer;
}

/* CARD */
.card {
  background: var(--card);
  padding: 20px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  border: 1px solid var(--card-2);
  background: var(--card-2);
  color: var(--text);
  font-size: 1rem;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius);
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #1d4ed8);
  color: white;
  font-size: 1.1rem;
}

/* RESULT */
.result {
  text-align: center;
  padding: 30px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(59,130,246,0.15), transparent);
  border: 1px solid var(--accent);
}

.result h2 {
  font-size: 1.4rem;
  margin-bottom: 10px;
}

.score {
  font-size: 2.5rem;
  font-weight: bold;
  margin: 20px 0;
}

.badge {
  display: inline-block;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--success);
  color: white;
  font-weight: bold;
}

/* ANIMATION */
.fade {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

/* MOBILE */
@media(max-width: 700px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">⚽ PredictFoot Pro</div>
    <button class="theme-btn" onclick="toggleTheme()">🌙 / ☀️</button>
  </div>

  <div class="card">
    <div class="grid">
      <input id="teamA" placeholder="Équipe A">
      <input id="teamB" placeholder="Équipe B">
    </div>
  </div>

  <button class="btn btn-primary" onclick="analyser()">
    🔥 Lancer l’analyse
  </button>

  <div id="result"></div>

</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

(function () {
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }
})();

function analyser() {
  const A = document.getElementById("teamA").value || "Équipe A";
  const B = document.getElementById("teamB").value || "Équipe B";

  // Simulation intelligente (placeholder)
  const scoreA = Math.floor(Math.random()*4);
  const scoreB = Math.floor(Math.random()*4);

  let resultText = "Match équilibré";
  if (scoreA > scoreB) resultText = A + " favori";
  if (scoreB > scoreA) resultText = B + " favori";

  document.getElementById("result").innerHTML = `
    <div class="card result fade">
      <h2>⭐ Meilleur pronostic</h2>
      <div class="score">${scoreA} - ${scoreB}</div>
      <div class="badge">${resultText}</div>
    </div>
  `;
}
</script>

</body>
</html>
