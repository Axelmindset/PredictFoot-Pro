<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrédictFoot Pro</title>

<style>
:root {
  --bg: #0f0f13;
  --card: #1a1a24;
  --card-2: #1e1e2a;
  --text: #ffffff;
  --text-muted: #94a3b8;
  --border: #2d2d3a;
  --accent: #3b82f6;
  --success: #22c55e;
}

body.light {
  --bg: #f8fafc;
  --card: #ffffff;
  --card-2: #f1f5f9;
  --text: #0f172a;
  --text-muted: #475569;
  --border: #e2e8f0;
  --accent: #2563eb;
  --success: #16a34a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
  transition: all 0.25s;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 16px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.sub {
  text-align: center;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.tab-btn {
  background: var(--card-2);
  color: var(--text-muted);
  padding: 10px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.tab-btn.active {
  background: var(--accent);
  color: white;
}

.tab-content {
  display: none;
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.tab-content.active {
  display: block;
}

.profile-option {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 10px;
  border-radius: 20px;
  margin: 5px 0;
  cursor: pointer;
}

.profile-option.selected {
  background: var(--accent);
  color: white;
}

.btn {
  padding: 12px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-secondary {
  background: var(--card-2);
  color: var(--text);
}

.result-card {
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: var(--card-2);
  padding: 10px;
  text-align: center;
  border-radius: 20px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ PrédictFoot Pro</h1>

<div style="text-align:center;margin-bottom:10px;">
<button onclick="toggleTheme()" class="btn btn-secondary">🌙 / ☀️</button>
</div>

<div class="sub">Analyse intelligente</div>

<button class="btn btn-primary" onclick="analyser()">Analyser</button>

<div id="resultats"></div>

</div>

<div id="toast" class="toast"></div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");

  if (document.body.classList.contains("light")) {
    localStorage.setItem("theme", "light");
  } else {
    localStorage.setItem("theme", "dark");
  }
}

(function () {
  const saved = localStorage.getItem("theme");
  if (saved === "light") {
    document.body.classList.add("light");
  }
})();

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity = "1";
  setTimeout(()=>t.style.opacity="0",2000);
}

function analyser() {
  document.getElementById("resultats").innerHTML = `
    <div class="result-card">
      🔥 Analyse terminée (mode pro actif)
    </div>
  `;
  showToast("Analyse faite !");
}
</script>

</body>
</html>
