<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚽ PrédictFoot Pro - Analyseur de matchs</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{background:linear-gradient(145deg,#f0f4fa,#e2e8f0);padding:1rem}
    .container{max-width:1200px;margin:0 auto}
    h1{font-size:1.5rem;text-align:center;margin-bottom:1rem;color:#1e293b}
    .team-card{background:white;border-radius:1rem;padding:1rem;margin-bottom:1rem}
    .team-title{font-weight:bold;font-size:1.2rem;margin-bottom:0.5rem}
    input, select{width:100%;padding:0.5rem;margin:0.3rem 0;border-radius:0.5rem;border:1px solid #ccc;font-size:1rem}
    .btn{background:#2563eb;color:white;border:none;padding:0.8rem;border-radius:1rem;font-weight:bold;width:100%;margin:0.5rem 0;cursor:pointer}
    .btn-small{background:#334155;padding:0.4rem 0.8rem;width:auto;margin:0.2rem;font-size:0.8rem}
    .result-card{background:white;border-radius:1rem;padding:1rem;margin-top:1rem}
    .flex{display:flex;flex-wrap:wrap;gap:0.5rem}
    .proba{background:#f1f5f9;border-radius:0.8rem;padding:0.5rem;flex:1;min-width:100px;text-align:center}
    .big{font-size:1.5rem;font-weight:bold;color:#2563eb}
    .whatsapp{background:#dcfce7;padding:0.8rem;border-radius:1rem;text-align:center;margin-top:1rem;cursor:pointer;border-left:4px solid #22c55e}
    .save-bar{display:flex;gap:0.5rem;justify-content:flex-end;margin-bottom:0.5rem;flex-wrap:wrap}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:0.5rem 1rem;border-radius:2rem;font-size:0.8rem;z-index:999;opacity:0;transition:opacity 0.3s}
  </style>
</head>
<body>
<div class="container">
  <h1>⚽ PrédictFoot Pro</h1>
  
  <div class="save-bar">
    <button class="btn btn-small" id="saveBtn">💾 Sauvegarder</button>
    <button class="btn btn-small" id="loadBtn">📂 Charger</button>
    <button class="btn btn-small" id="resetBtn">🔄 Réinitialiser</button>
  </div>
  
  <div class="team-card">
    <div class="team-title">🏆 ÉQUIPE A</div>
    <input type="text" id="teamA" placeholder="Nom équipe A" value="Paris SG">
    <div style="font-weight:bold;margin-top:0.5rem">📊 Offensif</div>
    <input type="number" id="a_tirs" placeholder="Tirs" value="12.4" step="0.1">
    <input type="number" id="a_tc" placeholder="Tirs cadrés" value="5.2" step="0.1">
    <input type="number" id="a_xg" placeholder="xG" value="1.6" step="0.1">
    <input type="number" id="a_corners" placeholder="Corners" value="5.8" step="0.1">
    <div style="font-weight:bold;margin-top:0.5rem">🛡️ Défensif (concédés)</div>
    <input type="number" id="a_tirs_con" placeholder="Tirs concédés" value="10.2" step="0.1">
    <input type="number" id="a_tc_con" placeholder="Tirs cadrés conc." value="4.1" step="0.1">
    <input type="number" id="a_xga" placeholder="xGA" value="1.2" step="0.1">
    <input type="number" id="a_corners_con" placeholder="Corners conc." value="4.9" step="0.1">
  </div>

  <div class="team-card">
    <div class="team-title">⚽ ÉQUIPE B</div>
    <input type="text" id="teamB" placeholder="Nom équipe B" value="Olympique Marseille">
    <div style="font-weight:bold;margin-top:0.5rem">📊 Offensif</div>
    <input type="number" id="b_tirs" placeholder="Tirs" value="10.8" step="0.1">
    <input type="number" id="b_tc" placeholder="Tirs cadrés" value="4.5" step="0.1">
    <input type="number" id="b_xg" placeholder="xG" value="1.3" step="0.1">
    <input type="number" id="b_corners" placeholder="Corners" value="5.1" step="0.1">
    <div style="font-weight:bold;margin-top:0.5rem">🛡️ Défensif (concédés)</div>
    <input type="number" id="b_tirs_con" placeholder="Tirs concédés" value="11.5" step="0.1">
    <input type="number" id="b_tc_con" placeholder="Tirs cadrés conc." value="4.7" step="0.1">
    <input type="number" id="b_xga" placeholder="xGA" value="1.5" step="0.1">
    <input type="number" id="b_corners_con" placeholder="Corners conc." value="5.3" step="0.1">
  </div>

  <button class="btn" id="analyser">🔍 ANALYSER LE MATCH</button>

  <div id="resultats" style="display:none"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  // Liste de tous les champs à sauvegarder
  const fieldIds = [
    'teamA', 'teamB',
    'a_tirs', 'a_tc', 'a_xg', 'a_corners', 'a_tirs_con', 'a_tc_con', 'a_xga', 'a_corners_con',
    'b_tirs', 'b_tc', 'b_xg', 'b_corners', 'b_tirs_con', 'b_tc_con', 'b_xga', 'b_corners_con'
  ];

  // Afficher un message temporaire
  function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.backgroundColor = isError ? '#dc2626' : '#1e293b';
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
    }, 2000);
  }

  // Sauvegarder toutes les valeurs dans localStorage
  function sauvegarderStats() {
    try {
      const data = {};
      fieldIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) data[id] = el.value;
      });
      localStorage.setItem('PredictorFootData', JSON.stringify(data));
      showToast('✅ Statistiques sauvegardées !');
      return true;
    } catch(e) {
      showToast('❌ Erreur de sauvegarde', true);
      return false;
    }
  }

  // Charger les valeurs depuis localStorage
  function chargerStats() {
    try {
      const saved = localStorage.getItem('PredictorFootData');
      if (!saved) {
        showToast('📭 Aucune sauvegarde trouvée', true);
        return false;
      }
      const data = JSON.parse(saved);
      let count = 0;
      fieldIds.forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] !== undefined) {
          el.value = data[id];
          count++;
        }
      });
      showToast(`📂 ${count} statistiques chargées !`);
      return true;
    } catch(e) {
      showToast('❌ Erreur de chargement', true);
      return false;
    }
  }

  // Réinitialiser aux valeurs par défaut
  function resetStats() {
    const defaults = {
      teamA: 'Paris SG', teamB: 'Olympique Marseille',
      a_tirs: '12.4', a_tc: '5.2', a_xg: '1.6', a_corners: '5.8',
      a_tirs_con: '10.2', a_tc_con: '4.1', a_xga: '1.2', a_corners_con: '4.9',
      b_tirs: '10.8', b_tc: '4.5', b_xg: '1.3', b_corners: '5.1',
      b_tirs_con: '11.5', b_tc_con: '4.7', b_xga: '1.5', b_corners_con: '5.3'
    };
    fieldIds.forEach(id => {
      const el = document.getElementById(id);
      if (el && defaults[id] !== undefined) el.value = defaults[id];
    });
    showToast('🔄 Réinitialisé aux valeurs par défaut');
  }

  // Sauvegarde automatique quand l'utilisateur modifie un champ
  function autoSave() {
    sauvegarderStats();
  }

  // Calcul des statistiques et prédictions
  function getStats(prefix){
    return {
      tirs: parseFloat(document.getElementById(prefix+'_tirs').value) || 0,
      tc: parseFloat(document.getElementById(prefix+'_tc').value) || 0,
      xg: parseFloat(document.getElementById(prefix+'_xg').value) || 0,
      corners: parseFloat(document.getElementById(prefix+'_corners').value) || 0,
      tirs_con: parseFloat(document.getElementById(prefix+'_tirs_con').value) || 0,
      tc_con: parseFloat(document.getElementById(prefix+'_tc_con').value) || 0,
      xga: parseFloat(document.getElementById(prefix+'_xga').value) || 0,
      corners_con: parseFloat(document.getElementById(prefix+'_corners_con').value) || 0,
    };
  }

  function normaliser(val, max, reverse = false){
    let norm = Math.min(100, Math.max(0, (val/max)*100));
    return reverse ? 100 - norm : norm;
  }

  function analyserMatch() {
    let nomA = document.getElementById('teamA').value.trim() || "Équipe A";
    let nomB = document.getElementById('teamB').value.trim() || "Équipe B";
    let statsA = getStats('a'), statsB = getStats('b');
    
    // Indices offensifs et défensifs
    let offA = normaliser(statsA.tirs,18)*0.2 + normaliser(statsA.tc,7)*0.25 + normaliser(statsA.xg,2.5)*0.25 + normaliser(statsA.corners,9)*0.3;
    let offB = normaliser(statsB.tirs,18)*0.2 + normaliser(statsB.tc,7)*0.25 + normaliser(statsB.xg,2.5)*0.25 + normaliser(statsB.corners,9)*0.3;
    let defA = normaliser(statsA.tirs_con,16,true)*0.25 + normaliser(statsA.tc_con,6,true)*0.25 + normaliser(statsA.xga,2.2,true)*0.25 + normaliser(statsA.corners_con,8,true)*0.25;
    let defB = normaliser(statsB.tirs_con,16,true)*0.25 + normaliser(statsB.tc_con,6,true)*0.25 + normaliser(statsB.xga,2.2,true)*0.25 + normaliser(statsB.corners_con,8,true)*0.25;
    
    let powerA = offA*0.55 + defA*0.45;
    let powerB = offB*0.55 + defB*0.45;
    
    let probA = powerA/(powerA+powerB+0.001)*100;
    let probB = powerB/(powerA+powerB+0.001)*100;
    let probNul = Math.max(8, Math.min(32, 20 - Math.abs(probA-probB)/5));
    probA = probA * (1-probNul/100);
    probB = probB * (1-probNul/100);
    let total = probA+probB+probNul;
    probA = probA/total*100;
    probB = probB/total*100;
    probNul = probNul/total*100;
    
    let expGolA = (statsA.xg + statsB.xga)/2;
    let expGolB = (statsB.xg + statsA.xga)/2;
    let over25 = Math.min(85, Math.max(20, 28 + (expGolA+expGolB-1.8)*18));
    let under25 = 100 - over25;
    let btts = Math.min(82, Math.max(18, (expGolA/(expGolA+0.6)*45 + expGolB/(expGolB+0.6)*45)));
    let corners = (statsA.corners + statsB.corners_con + statsB.corners + statsA.corners_con)/2;
    let tirsCadres = (statsA.tc + statsB.tc_con + statsB.tc + statsA.tc_con)/2;
    
    let bttsTexte = btts > 50 ? "OUI" : "NON";
    
    // Double chance
    let dc1X = probA + probNul;
    let dcX2 = probB + probNul;
    
    // Meilleurs pronostics
    let topTips = [];
    if(probA > 60) topTips.push(`Victoire ${nomA} : ${probA.toFixed(1)}%`);
    if(probB > 60) topTips.push(`Victoire ${nomB} : ${probB.toFixed(1)}%`);
    if(btts > 62) topTips.push(`BTTS OUI : ${btts.toFixed(1)}%`);
    if(over25 > 65) topTips.push(`Over 2.5 : ${over25.toFixed(1)}%`);
    if(under25 > 65) topTips.push(`Under 2.5 : ${under25.toFixed(1)}%`);
    if(dc1X > 70) topTips.push(`Double chance 1X : ${dc1X.toFixed(1)}%`);
    if(dcX2 > 70) topTips.push(`Double chance X2 : ${dcX2.toFixed(1)}%`);
    if(topTips.length === 0) topTips.push("Match équilibré, peu de certitudes");
    
    // Analyse textuelle
    let styleA = offA > 65 ? "très offensif" : (offA > 45 ? "équilibré" : "plutôt défensif");
    let styleB = offB > 65 ? "très offensif" : (offB > 45 ? "équilibré" : "plutôt défensif");
    let analyse = `${nomA} (${styleA}) vs ${nomB} (${styleB}). Buts attendus: ${(expGolA+expGolB).toFixed(1)}. `;
    analyse += `Puissance: ${powerA.toFixed(0)} contre ${powerB.toFixed(0)}. `;
    analyse += `Corners estimés: ${corners.toFixed(1)}.`;
    
    let whatsText = `⚽ PRONOSTICS ${nomA} vs ${nomB} ⚽\n` +
      `🔮 Victoire: ${nomA} ${probA.toFixed(1)}% | Nul ${probNul.toFixed(1)}% | ${nomB} ${probB.toFixed(1)}%\n` +
      `🔄 Double chance: 1X ${dc1X.toFixed(1)}% | X2 ${dcX2.toFixed(1)}%\n` +
      `🎯 BTTS: ${btts.toFixed(1)}% (${bttsTexte})\n` +
      `📊 Over 2.5: ${over25.toFixed(1)}% | Under 2.5: ${under25.toFixed(1)}%\n` +
      `🏅 Meilleurs tips: ${topTips.slice(0,3).join(', ')}\n` +
      `📐 Corners ~ ${corners.toFixed(1)} | Tirs cadrés ~ ${tirsCadres.toFixed(1)}`;
    
    let html = '<div class="result-card">';
    html += '<h3>📊 RÉSULTATS DES PRÉDICTIONS</h3>';
    html += '<div class="flex">';
    html += `<div class="proba"><div>🏆 ${nomA}</div><div class="big">${probA.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🤝 NUL</div><div class="big">${probNul.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🏆 ${nomB}</div><div class="big">${probB.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🔄 1X</div><div class="big">${dc1X.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🔄 X2</div><div class="big">${dcX2.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>⚽ BTTS</div><div class="big">${btts.toFixed(1)}%</div><div>${bttsTexte}</div></div>`;
    html += `<div class="proba"><div>📈 Over 2.5</div><div class="big">${over25.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>📉 Under 2.5</div><div class="big">${under25.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🚩 Corners</div><div class="big">${corners.toFixed(1)}</div></div>`;
    html += `<div class="proba"><div>🎯 Tirs cadrés</div><div class="big">${tirsCadres.toFixed(1)}</div></div>`;
    html += '</div>';
    
    html += `<div style="background:#eef2ff;border-radius:0.8rem;padding:0.8rem;margin:0.8rem 0">
              <strong>⭐ MEILLEURS PRONOSTICS</strong><br>${topTips.map(t => `✅ ${t}`).join('<br>')}
            </div>`;
    
    html += `<div style="background:#f1f5f9;border-radius:0.8rem;padding:0.8rem;margin:0.8rem 0">
              <strong>📋 ANALYSE TACTIQUE</strong><br>${analyse}
            </div>`;
    
    html += `<div class="whatsapp" onclick="copierTexte(\`${whatsText.replace(/`/g, '\\`')}\`)">
              📋 Cliquez ici pour copier le pronostic WhatsApp
            </div>`;
    html += '</div>';
    
    document.getElementById('resultats').innerHTML = html;
    document.getElementById('resultats').style.display = 'block';
  }
  
  function copierTexte(texte) {
    navigator.clipboard.writeText(texte).then(() => {
      showToast('✅ Pronostic copié ! Collez dans WhatsApp');
    }).catch(() => {
      showToast('❌ Appuyez longuement pour copier', true);
    });
  }
  
  // Attacher les événements
  document.getElementById('analyser').onclick = analyserMatch;
  document.getElementById('saveBtn').onclick = sauvegarderStats;
  document.getElementById('loadBtn').onclick = chargerStats;
  document.getElementById('resetBtn').onclick = resetStats;
  
  // Sauvegarde automatique à chaque modification
  fieldIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('change', autoSave);
      el.addEventListener('input', autoSave);
    }
  });
  
  // Chargement automatique au démarrage
  try {
    if (localStorage.getItem('PredictorFootData')) {
      chargerStats();
    }
  } catch(e) {}
  
  window.copierTexte = copierTexte;
</script>
</body>
</html>
