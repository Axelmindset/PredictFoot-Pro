<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚽ PrédictFoot Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{background:linear-gradient(145deg,#f0f4fa,#e2e8f0);padding:1rem}
    .container{max-width:1200px;margin:0 auto}
    h1{font-size:1.5rem;text-align:center;margin-bottom:1rem;color:#1e293b}
    .team-card{background:white;border-radius:1rem;padding:1rem;margin-bottom:1rem}
    .team-title{font-weight:bold;font-size:1.2rem;margin-bottom:0.5rem}
    input{width:100%;padding:0.5rem;margin:0.3rem 0;border-radius:0.5rem;border:1px solid #ccc}
    .btn{background:#2563eb;color:white;border:none;padding:0.8rem;border-radius:1rem;font-weight:bold;width:100%;margin:0.5rem 0;cursor:pointer}
    .result-card{background:white;border-radius:1rem;padding:1rem;margin-top:1rem}
    .flex{display:flex;flex-wrap:wrap;gap:0.5rem}
    .proba{background:#f1f5f9;border-radius:0.8rem;padding:0.5rem;flex:1;min-width:100px;text-align:center}
    .big{font-size:1.5rem;font-weight:bold;color:#2563eb}
    .whatsapp{background:#dcfce7;padding:0.8rem;border-radius:1rem;text-align:center;margin-top:1rem;cursor:pointer}
  </style>
</head>
<body>
<div class="container">
  <h1>⚽ PrédictFoot Pro</h1>
  
  <div class="team-card">
    <div class="team-title">🏆 ÉQUIPE A</div>
    <input type="text" id="teamA" placeholder="Nom de l'équipe A" value="Paris SG">
    <div style="font-weight:bold;margin-top:0.5rem">📊 Offensif</div>
    <input type="number" id="a_tirs" placeholder="Tirs" value="12.4">
    <input type="number" id="a_tc" placeholder="Tirs cadrés" value="5.2">
    <input type="number" id="a_xg" placeholder="xG" value="1.6">
    <input type="number" id="a_corners" placeholder="Corners" value="5.8">
    <div style="font-weight:bold;margin-top:0.5rem">🛡️ Défensif (concédés)</div>
    <input type="number" id="a_tirs_con" placeholder="Tirs concédés" value="10.2">
    <input type="number" id="a_tc_con" placeholder="Tirs cadrés conc." value="4.1">
    <input type="number" id="a_xga" placeholder="xGA" value="1.2">
    <input type="number" id="a_corners_con" placeholder="Corners conc." value="4.9">
  </div>

  <div class="team-card">
    <div class="team-title">⚽ ÉQUIPE B</div>
    <input type="text" id="teamB" placeholder="Nom de l'équipe B" value="Olympique Marseille">
    <div style="font-weight:bold;margin-top:0.5rem">📊 Offensif</div>
    <input type="number" id="b_tirs" placeholder="Tirs" value="10.8">
    <input type="number" id="b_tc" placeholder="Tirs cadrés" value="4.5">
    <input type="number" id="b_xg" placeholder="xG" value="1.3">
    <input type="number" id="b_corners" placeholder="Corners" value="5.1">
    <div style="font-weight:bold;margin-top:0.5rem">🛡️ Défensif (concédés)</div>
    <input type="number" id="b_tirs_con" placeholder="Tirs concédés" value="11.5">
    <input type="number" id="b_tc_con" placeholder="Tirs cadrés conc." value="4.7">
    <input type="number" id="b_xga" placeholder="xGA" value="1.5">
    <input type="number" id="b_corners_con" placeholder="Corners conc." value="5.3">
  </div>

  <button class="btn" id="analyser">🔍 ANALYSER LE MATCH</button>

  <div id="resultats" style="display:none"></div>
</div>

<script>
  function getStats(prefix){
    return {
      tirs: parseFloat(document.getElementById(prefix+'_tirs').value)||0,
      tc: parseFloat(document.getElementById(prefix+'_tc').value)||0,
      xg: parseFloat(document.getElementById(prefix+'_xg').value)||0,
      corners: parseFloat(document.getElementById(prefix+'_corners').value)||0,
      tirs_con: parseFloat(document.getElementById(prefix+'_tirs_con').value)||0,
      tc_con: parseFloat(document.getElementById(prefix+'_tc_con').value)||0,
      xga: parseFloat(document.getElementById(prefix+'_xga').value)||0,
      corners_con: parseFloat(document.getElementById(prefix+'_corners_con').value)||0,
    };
  }

  function normaliser(val, max){ return Math.min(100, Math.max(0, (val/max)*100)); }

  function calculer(stats){
    let att = normaliser(stats.tirs,18)*0.2 + normaliser(stats.tc,7)*0.25 + normaliser(stats.xg,2.5)*0.25 + normaliser(stats.corners,9)*0.3;
    let def = normaliser(stats.tirs_con,16,true)*0.25 + normaliser(stats.tc_con,6,true)*0.25 + normaliser(stats.xga,2.2,true)*0.3 + normaliser(stats.corners_con,8,true)*0.2;
    return { att, def };
  }

  document.getElementById('analyser').onclick = function(){
    let nomA = document.getElementById('teamA').value.trim() || "Équipe A";
    let nomB = document.getElementById('teamB').value.trim() || "Équipe B";
    let statsA = getStats('a'), statsB = getStats('b');
    let idxA = calculer(statsA), idxB = calculer(statsB);
    let powerA = idxA.att*0.6 + idxA.def*0.4;
    let powerB = idxB.att*0.6 + idxB.def*0.4;
    let probA = powerA/(powerA+powerB+0.001)*100;
    let probB = powerB/(powerA+powerB+0.001)*100;
    let probNul = Math.max(5, Math.min(35, 25 - Math.abs(probA-probB)/4));
    probA = probA * (1-probNul/100);
    probB = probB * (1-probNul/100);
    let total = probA+probB+probNul;
    probA = probA/total*100;
    probB = probB/total*100;
    probNul = probNul/total*100;
    
    let expGolA = (statsA.xg + statsB.xga)/2;
    let expGolB = (statsB.xg + statsA.xga)/2;
    let over25 = Math.min(85, Math.max(20, 30 + (expGolA+expGolB-1.8)*20));
    let btts = Math.min(80, Math.max(20, (expGolA/(expGolA+0.5)*40 + expGolB/(expGolB+0.5)*40)));
    let corners = (statsA.corners + statsB.corners_con + statsB.corners + statsA.corners_con)/2;
    
    let html = '<div class="result-card">';
    html += '<h3>📊 RÉSULTATS</h3>';
    html += '<div class="flex">';
    html += `<div class="proba"><div>🏆 ${nomA}</div><div class="big">${probA.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🤝 NUL</div><div class="big">${probNul.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🏆 ${nomB}</div><div class="big">${probB.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>⚽ BTTS</div><div class="big">${btts.toFixed(1)}%</div><div>${btts>50?'OUI':'NON'}</div></div>`;
    html += `<div class="proba"><div>📈 Over 2.5</div><div class="big">${over25.toFixed(1)}%</div></div>`;
    html += `<div class="proba"><div>🚩 Corners</div><div class="big">${corners.toFixed(1)}</div></div>`;
    html += '</div>';
    
    let whatsText = `⚽ ${nomA} vs ${nomB} ⚽\nVictoire ${nomA}: ${probA.toFixed(1)}% | Nul: ${probNul.toFixed(1)}% | Victoire ${nomB}: ${probB.toFixed(1)}%\nBTTS: ${btts.toFixed(1)}% (${btts>50?'OUI':'NON'})\nOver 2.5: ${over25.toFixed(1)}%\nCorners estimés: ${corners.toFixed(1)}`;
    
    html += `<div class="whatsapp" onclick="navigator.clipboard.writeText(\`${whatsText.replace(/`/g,'\\`')}\`); alert('✅ Copié !')">📋 Cliquez ici pour copier le pronostic WhatsApp</div>`;
    html += '</div>';
    
    document.getElementById('resultats').innerHTML = html;
    document.getElementById('resultats').style.display = 'block';
  };
</script>
</body>
</html>
