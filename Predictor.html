<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrédictFoot Pro</title>

<style>
body {
  background:#0f0f13;
  color:white;
  font-family: system-ui;
  padding:16px;
}

.container {
  max-width:1000px;
  margin:auto;
}

h1 {
  text-align:center;
}

.tabs {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab-btn {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e1e2a;
  color:white;
  cursor:pointer;
}

.tab-btn.active {
  background:#3b82f6;
}

.tab-content {
  display:none;
  background:#1a1a24;
  padding:15px;
  border-radius:15px;
}

.tab-content.active {
  display:block;
}

.profile-option {
  background:#0f0f13;
  padding:8px;
  margin:5px 0;
  border-radius:10px;
  cursor:pointer;
  border:1px solid #2d2d3a;
}

.profile-option.selected {
  background:#3b82f6;
}

.btn {
  padding:12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

.btn-primary {
  background:#3b82f6;
  color:white;
}

.result-card {
  margin-top:20px;
  background:#1a1a24;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ PrédictFoot Pro</h1>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(1)">Équipe A</button>
<button class="tab-btn" onclick="openTab(2)">Équipe B</button>
<button class="tab-btn" onclick="openTab(3)">Analyse</button>
</div>

<!-- TEAM A -->
<div id="tab1" class="tab-content active">
<input id="teamA" placeholder="Équipe A" value="Paris SG">

<div class="profile-option" onclick="selectOption(this, 'a', 'corners', 3)">🔥 Corners forts</div>
<div class="profile-option" onclick="selectOption(this, 'a', 'corners', 2)">✅ Corners moyens</div>
<div class="profile-option" onclick="selectOption(this, 'a', 'corners', 1)">➖ Corners faibles</div>
</div>

<!-- TEAM B -->
<div id="tab2" class="tab-content">
<input id="teamB" placeholder="Équipe B" value="Toulouse">

<div class="profile-option" onclick="selectOption(this, 'b', 'corners', 3)">🔥 Corners forts</div>
<div class="profile-option" onclick="selectOption(this, 'b', 'corners', 2)">✅ Corners moyens</div>
<div class="profile-option" onclick="selectOption(this, 'b', 'corners', 1)">➖ Corners faibles</div>
</div>

<!-- RESULT -->
<div id="tab3" class="tab-content">

<button class="btn btn-primary" onclick="analyser()">ANALYSER</button>

<div id="result"></div>

</div>

</div>

<script>

let data = {
  a: { corners: 0 },
  b: { corners: 0 }
};

function openTab(tab){
  document.querySelectorAll('.tab-content').forEach((t,i)=>{
    t.classList.remove('active');
  });

  document.getElementById('tab'+tab).classList.add('active');
}

function selectOption(el, team, type, value){
  data[team][type] = value;

  el.parentElement.querySelectorAll('.profile-option').forEach(o=>{
    o.classList.remove('selected');
  });

  el.classList.add('selected');
}

function analyser(){

  let scoreA = data.a.corners;
  let scoreB = data.b.corners;

  let diff = Math.abs(scoreA - scoreB);

  let confiance = 50 + diff * 10;
  if(confiance > 95) confiance = 95;

  let prediction = "";

  if(scoreA > scoreB){
    prediction = "Victoire Équipe A";
  } else if(scoreB > scoreA){
    prediction = "Victoire Équipe B";
  } else {
    prediction = "Match nul";
  }

  let risk = "Moyen";
  if(diff >= 2) risk = "Faible";
  if(diff === 0) risk = "Élevé";

  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <h3>📊 Analyse</h3>
      <p><b>Pronostic :</b> ${prediction}</p>
      <p><b>Score A :</b> ${scoreA}</p>
      <p><b>Score B :</b> ${scoreB}</p>
      <p><b>Confiance :</b> ${confiance}%</p>
      <p><b>Risque :</b> ${risk}</p>
    </div>
  `;
}

</script>

</body>
</html>
