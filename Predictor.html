      <div class="input-group"><label>xG (Expected Goals)</label><input type="number" id="b_xg" value="1.3" step="0.1"></div>
      <div class="input-group"><label>Corners obtenus</label><input type="number" id="b_corners" value="5.1" step="0.1"></div>
    </div>
    
    <div class="section-title"><i class="fas fa-shield-alt"></i> STATISTIQUES DÉFENSIVES (concédées)</div>
    <div class="grid-2cols">
      <div class="input-group"><label>Tirs concédés</label><input type="number" id="b_tirs_con" value="11.5" step="0.1"></div>
      <div class="input-group"><label>Tirs cadrés conc.</label><input type="number" id="b_tc_con" value="4.7" step="0.1"></div>
      <div class="input-group"><label>xGA (Expected Against)</label><input type="number" id="b_xga" value="1.5" step="0.1"></div>
      <div class="input-group"><label>Corners concédés</label><input type="number" id="b_corners_con" value="5.3" step="0.1"></div>
    </div>
  </div>

  <!-- Sauvegarde -->
  <div id="tab3" class="tab-content">
    <div class="section-title"><i class="fas fa-database"></i> GESTION DES DONNÉES</div>
    <div class="btn-group">
      <button class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> Sauvegarder</button>
      <button class="btn btn-secondary" id="loadBtn"><i class="fas fa-folder-open"></i> Charger</button>
      <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo"></i> Réinitialiser</button>
    </div>
    <div style="background:#0f0f13; border-radius:16px; padding:16px; text-align:center; margin-top:16px; border:1px solid #2d2d3a;">
      <i class="fas fa-shield-alt"></i> Vos données sont sauvegardées <strong>localement</strong> sur votre téléphone.<br>
      <span style="font-size:0.75rem; color:#64748b;">Personne d'autre n'y a accès.</span>
    </div>
  </div>

  <!-- Bouton Analyser -->
  <button class="btn btn-primary" id="analyserBtn" style="margin: 8px 0 16px 0;"><i class="fas fa-chart-line"></i> ANALYSER LE MATCH</button>

  <!-- Zone des résultats -->
  <div id="resultats" style="display:none;"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  // Liste de TOUS les champs
  const allFields = [
    'teamA', 'teamB',
    'a_tirs', 'a_tc', 'a_xg', 'a_corners', 'a_tirs_con', 'a_tc_con', 'a_xga', 'a_corners_con',
    'b_tirs', 'b_tc', 'b_xg', 'b_corners', 'b_tirs_con', 'b_tc_con', 'b_xga', 'b_corners_con'
  ];

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.backgroundColor = isError ? '#dc2626' : '#1e293b';
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2000);
  }

  // Sauvegarde FORCE avec localStorage
  function sauvegarder() {
    try {
      const data = {};
      allFields.forEach(id => {
        const el = document.getElementById(id);
        if (el) data[id] = el.value;
      });
      localStorage.setItem('PredictorFootPro_Save', JSON.stringify(data));
      showToast('✅ Données sauvegardées avec succès !');
      return true;
    } catch(e) {
      showToast('❌ Erreur de sauvegarde', true);
      return false;
    }
  }

  // Chargement
  function charger() {
    try {
      const saved = localStorage.getItem('PredictorFootPro_Save');
      if (!saved) {
        showToast('📭 Aucune sauvegarde trouvée', true);
        return false;
      }
      const data = JSON.parse(saved);
      let count = 0;
      allFields.forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] !== undefined) {
          el.value = data[id];
          count++;
        }
      });
      showToast(`📂 ${count} valeurs chargées !`);
      return true;
    } catch(e) {
      showToast('❌ Erreur de chargement', true);
      return false;
    }
  }

  // Réinitialisation
  function reinitialiser() {
    const defaults = {
      teamA: 'Paris SG', teamB: 'Olympique Marseille',
      a_tirs: '12.4', a_tc: '5.2', a_xg: '1.6', a_corners: '5.8',
      a_tirs_con: '10.2', a_tc_con: '4.1', a_xga: '1.2', a_corners_con: '4.9',
      b_tirs: '10.8', b_tc: '4.5', b_xg: '1.3', b_corners: '5.1',
      b_tirs_con: '11.5', b_tc_con: '4.7', b_xga: '1.5', b_corners_con: '5.3'
    };
    allFields.forEach(id => {
      const el = document.getElementById(id);
      if (el && defaults[id] !== undefined) el.value = defaults[id];
    });
    showToast('🔄 Réinitialisé aux valeurs par défaut');
  }

  // Calcul des stats
  function getStats(prefix) {
    return {
      tirs: parseFloat(document.getElementById(prefix+'_tirs').value) || 0,
      tc: parseFloat(document.getElementById(prefix+'_tc').value) || 0,
      xg: parseFloat(document.getElementById(prefix+'_xg').value) || 0,
      corners: parseFloat(document.getElementById(prefix+'_corners').value) || 0,
      tirs_con: parseFloat(document.getElementById(prefix+'_tirs_con').value) || 0,
      tc_con: parseFloat(document.getElementById(prefix+'_tc_con').value) || 0,
      xga: parseFloat(document.getElementById(prefix+'_xga').value) || 0,
      corners_con: parseFloat(document.getElementById(prefix+'_corners_con').value) || 0,
    };
  }

  function normaliser(val, max, reverse = false) {
    let norm = Math.min(100, Math.max(0, (val/max)*100));
    return reverse ? 100 - norm : norm;
  }

  // Analyse principale
  function analyser() {
    const nomA = document.getElementById('teamA').value.trim() || 'Équipe A';
    const nomB = document.getElementById('teamB').value.trim() || 'Équipe B';
    const statsA = getStats('a');
    const statsB = getStats('b');

    // Calcul des indices
    const offA = normaliser(statsA.tirs,18)*0.2 + normaliser(statsA.tc,7)*0.25 + normaliser(statsA.xg,2.5)*0.25 + normaliser(statsA.corners,9)*0.3;
    const offB = normaliser(statsB.tirs,18)*0.2 + normaliser(statsB.tc,7)*0.25 + normaliser(statsB.xg,2.5)*0.25 + normaliser(statsB.corners,9)*0.3;
    const defA = normaliser(statsA.tirs_con,16,true)*0.25 + normaliser(statsA.tc_con,6,true)*0.25 + normaliser(statsA.xga,2.2,true)*0.25 + normaliser(statsA.corners_con,8,true)*0.25;
    const defB = normaliser(statsB.tirs_con,16,true)*0.25 + normaliser(statsB.tc_con,6,true)*0.25 + normaliser(statsB.xga,2.2,true)*0.25 + normaliser(statsB.corners_con,8,true)*0.25;
    
    let powerA = offA*0.55 + defA*0.45;
    let powerB = offB*0.55 + defB*0.45;
    
    let probA = powerA/(powerA+powerB+0.001)*100;
    let probB = powerB/(powerA+powerB+0.001)*100;
    let nulBase = Math.max(8, Math.min(32, 20 - Math.abs(probA-probB)/6));
    probA = probA * (1 - nulBase/100);
    probB = probB * (1 - nulBase/100);
    const total = probA + probB + nulBase;
    const finalA = probA/total*100;
    const finalB = probB/total*100;
    const finalNul = nulBase/total*100;
    
    const expGolA = (statsA.xg + statsB.xga)/2;
    const expGolB = (statsB.xg + statsA.xga)/2;
    const over25 = Math.min(85, Math.max(20, 28 + (expGolA+expGolB-1.8)*18));
    const under25 = 100 - over25;
    const btts = Math.min(82, Math.max(18, (expGolA/(expGolA+0.6)*45 + expGolB/(expGolB+0.6)*45)));
    const corners = (statsA.corners + statsB.corners_con + statsB.corners + statsA.corners_con)/2;
    const tirsCadres = (statsA.tc + statsB.tc_con + statsB.tc + statsA.tc_con)/2;
    const double1X = finalA + finalNul;
    const doubleX2 = finalB + finalNul;
    const double12 = finalA + finalB;
    
    // Meilleurs tips
    const tips = [];
    if(finalA > 58) tips.push(`✅ Victoire ${nomA} : ${finalA.toFixed(1)}%`);
    if(finalB > 58) tips.push(`✅ Victoire ${nomB} : ${finalB.toFixed(1)}%`);
    if(btts > 60) tips.push(`✅ BTTS OUI : ${btts.toFixed(1)}%`);
    if(over25 > 62) tips.push(`✅ Over 2.5 : ${over25.toFixed(1)}%`);
    if(under25 > 62) tips.push(`✅ Under 2.5 : ${under25.toFixed(1)}%`);
    if(double1X > 68) tips.push(`✅ Double chance 1X : ${double1X.toFixed(1)}%`);
    if(doubleX2 > 68) tips.push(`✅ Double chance X2 : ${doubleX2.toFixed(1)}%`);
    if(tips.length === 0) tips.push("⚖️ Match équilibré, peu de certitudes");
    
    // Texte WhatsApp
    const whatsText = `⚽ PRONOSTICS ${nomA} vs ${nomB} ⚽\n` +
      `🔮 Victoire: ${nomA} ${finalA.toFixed(1)}% | Nul ${finalNul.toFixed(1)}% | ${nomB} ${finalB.toFixed(1)}%\n` +
      `🔄 Double chance: 1X ${double1X.toFixed(1)}% | X2 ${doubleX2.toFixed(1)}% | 12 ${double12.toFixed(1)}%\n` +
      `🎯 BTTS: ${btts.toFixed(1)}% (${btts>50?'OUI':'NON'})\n` +
      `📊 Over 2.5: ${over25.toFixed(1)}% | Under 2.5: ${under25.toFixed(1)}%\n` +
      `🏅 ${tips.slice(0,3).join(' | ')}\n` +
      `📐 Corners estimés: ${corners.toFixed(1)} | Tirs cadrés: ${tirsCadres.toFixed(1)}`;
    
    const html = `
      <div class="result-card">
        <h3><i class="fas fa-chart-pie"></i> RÉSULTATS DES PRÉDICTIONS</h3>
        <div class="result-grid">
          <div class="result-item"><div>🏆 ${nomA}</div><div class="result-value">${finalA.toFixed(1)}%</div></div>
          <div class="result-item"><div>🤝 NUL</div><div class="result-value">${finalNul.toFixed(1)}%</div></div>
          <div class="result-item"><div>🏆 ${nomB}</div><div class="result-value">${finalB.toFixed(1)}%</div></div>
          <div class="result-item"><div>🔄 1X</div><div class="result-value">${double1X.toFixed(1)}%</div></div>
          <div class="result-item"><div>🔄 X2</div><div class="result-value">${doubleX2.toFixed(1)}%</div></div>
          <div class="result-item"><div>🔄 12</div><div class="result-value">${double12.toFixed(1)}%</div></div>
          <div class="result-item"><div>⚽ BTTS</div><div class="result-value">${btts.toFixed(1)}%</div><div style="font-size:0.7rem;">${btts>50?'OUI':'NON'}</div></div>
          <div class="result-item"><div>📈 Over 2.5</div><div class="result-value">${over25.toFixed(1)}%</div></div>
          <div class="result-item"><div>📉 Under 2.5</div><div class="result-value">${under25.toFixed(1)}%</div></div>
          <div class="result-item"><div>🚩 Corners</div><div class="result-value">${corners.toFixed(1)}</div></div>
          <div class="result-item"><div>🎯 Tirs cadrés</div><div class="result-value">${tirsCadres.toFixed(1)}</div></div>
        </div>
        <div style="background:#0f0f13; border-radius:16px; padding:14px; margin:12px 0; border:1px solid #2d2d3a;">
          <strong style="color:#3b82f6;">⭐ MEILLEURS PRONOSTICS</strong><br>
          ${tips.map(t => `<span style="color:#cbd5e1;">${t}</span><br>`).join('')}
        </div>
        <div class="whatsapp-btn" onclick="copierWhatsApp('${whatsText.replace(/'/g, "\\'")}')">
          📋 Cliquer ici pour copier le résumé WhatsApp
        </div>
      </div>
    `;
    
    document.getElementById('resultats').innerHTML = html;
    document.getElementById('resultats').style.display = 'block';
  }

  function copierWhatsApp(texte) {
    navigator.clipboard.writeText(texte).then(() => {
      showToast('✅ Pronostic copié ! Collez dans WhatsApp');
    }).catch(() => {
      showToast('❌ Copie manuelle : appui long', true);
    });
  }

  // Gestion des onglets
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  // Événements
  document.getElementById('saveBtn').addEventListener('click', sauvegarder);
  document.getElementById('loadBtn').addEventListener('click', charger);
  document.getElementById('resetBtn').addEventListener('click', reinitialiser);
  document.getElementById('analyserBtn').addEventListener('click', analyser);
  
  window.copierWhatsApp = copierWhatsApp;
  
  // Chargement automatique au démarrage
  setTimeout(() => { charger(); }, 100);
</script>
</body>
</html>
