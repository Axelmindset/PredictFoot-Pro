<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test xG · xGA · Confrontation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 4px;
        }
        .card {
            background: #141c2b;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #1e2a3d;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title i {
            color: #10b981;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field-group {
            margin-bottom: 12px;
        }
        .field-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .field-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #1e2a3d;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 16px;
            font-weight: 500;
            transition: border 0.2s;
        }
        .field-group input:focus {
            border-color: #10b981;
            outline: none;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            width: 100%;
            justify-content: center;
            padding: 14px;
        }
        .btn-secondary {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #2d3a4f;
            width: 100%;
            justify-content: center;
            padding: 14px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-group .btn { flex: 1; }

        .result-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1e2a3d;
            margin-top: 12px;
        }
        .result-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e2a3d;
            font-size: 15px;
        }
        .result-line:last-child { border-bottom: none; }
        .result-label { color: #94a3b8; }
        .result-value { font-weight: 600; color: #10b981; }
        .result-value.orange { color: #f59e0b; }
        .result-value.blue { color: #3b82f6; }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge-green { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid #10b981; }
        .badge-blue { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .badge-orange { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid #f59e0b; }

        .formula-box {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #94a3b8;
            border-left: 3px solid #10b981;
        }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>⚽ Test xG · xGA · Confrontation</h1>
        <p>Valide les 3 formules fondamentales</p>
    </div>

    <!-- ===== SAISIE ===== -->
    <div class="card">
        <div class="card-title"><i>📊</i> Données du match</div>
        <div class="grid-2">
            <div>
                <div class="field-group">
                    <label>🏠 Équipe A</label>
                    <input type="text" id="nameA" value="POR" />
                </div>
                <div class="field-group">
                    <label>Buts marqués / match</label>
                    <input type="number" id="goalsScoredA" value="1.9" step="0.1" />
                </div>
                <div class="field-group">
                    <label>Buts encaissés / match</label>
                    <input type="number" id="goalsConcededA" value="0.6" step="0.1" />
                </div>
            </div>
            <div>
                <div class="field-group">
                    <label>✈️ Équipe B</label>
                    <input type="text" id="nameB" value="UZB" />
                </div>
                <div class="field-group">
                    <label>Buts marqués / match</label>
                    <input type="number" id="goalsScoredB" value="1.0" step="0.1" />
                </div>
                <div class="field-group">
                    <label>Buts encaissés / match</label>
                    <input type="number" id="goalsConcededB" value="1.6" step="0.1" />
                </div>
            </div>
        </div>
        <div style="margin-top:16px;">
            <button class="btn btn-primary" id="analyserBtn">🚀 Calculer</button>
        </div>
        <div style="margin-top:10px;">
            <button class="btn btn-secondary" onclick="loadDemo()">⚡ Charger démo (POR vs UZB)</button>
        </div>
    </div>

    <!-- ===== RÉSULTATS ===== -->
    <div id="results">
        <div class="card">
            <div class="card-title"><i>📐</i> Résultats</div>
            <div id="resultContainer"></div>
        </div>
    </div>

</div>

<script>
    // ============================================================
    //  FORMULES 1, 2 et 3 (seulement)
    // ============================================================

    // FORMULE 1 : xG
    function computeXG(goalsScoredA, goalsConcededB, goalsScoredB, goalsConcededA) {
        const xgA = (goalsScoredA * goalsConcededB + goalsConcededB) / 2;
        const xgB = (goalsScoredB * goalsConcededA + goalsConcededA) / 2;
        return { xgA, xgB };
    }

    // FORMULE 2 : xGA
    function computeXGA(goalsConcededA, goalsScoredB, goalsConcededB, goalsScoredA) {
        const xgaA = (goalsConcededA * goalsScoredB + goalsScoredB) / 2;
        const xgaB = (goalsConcededB * goalsScoredA + goalsScoredA) / 2;
        return { xgaA, xgaB };
    }

    // FORMULE 3 : Confrontation
    function confront(xgA, xgB, xgaA, xgaB) {
        const moyXGA = (xgaA + xgaB) / 2;
        const adjA = xgA * (xgaB / moyXGA);
        const adjB = xgB * (xgaA / moyXGA);
        return { adjA, adjB, moyXGA };
    }

    // ============================================================
    //  INTERFACE
    // ============================================================

    function getValues() {
        const nameA = document.getElementById('nameA').value.trim() || 'A';
        const nameB = document.getElementById('nameB').value.trim() || 'B';
        const gsA = parseFloat(document.getElementById('goalsScoredA').value) || 0;
        const gcA = parseFloat(document.getElementById('goalsConcededA').value) || 0;
        const gsB = parseFloat(document.getElementById('goalsScoredB').value) || 0;
        const gcB = parseFloat(document.getElementById('goalsConcededB').value) || 0;
        return { nameA, nameB, gsA, gcA, gsB, gcB };
    }

    function runAnalysis() {
        const { nameA, nameB, gsA, gcA, gsB, gcB } = getValues();

        // FORMULE 1 : xG
        const { xgA, xgB } = computeXG(gsA, gcB, gsB, gcA);

        // FORMULE 2 : xGA
        const { xgaA, xgaB } = computeXGA(gcA, gsB, gcB, gsA);

        // FORMULE 3 : Confrontation
        const { adjA, adjB, moyXGA } = confront(xgA, xgB, xgaA, xgaB);

        // Affichage
        const container = document.getElementById('resultContainer');
        container.innerHTML = `
            <!-- FORMULE 1 -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#10b981;">📐 FORMULE 1 : xG</span>
                    <span class="badge badge-green">Validée</span>
                </div>
                <div class="formula-box">
                    xG_A = (${gsA.toFixed(1)} × ${gcB.toFixed(1)} + ${gcB.toFixed(1)}) / 2 = ${xgA.toFixed(3)}
                    <br>
                    xG_B = (${gsB.toFixed(1)} × ${gcA.toFixed(1)} + ${gcA.toFixed(1)}) / 2 = ${xgB.toFixed(3)}
                </div>
                <div class="result-box">
                    <div class="result-line"><span class="result-label">xG ${nameA}</span><span class="result-value">${xgA.toFixed(3)}</span></div>
                    <div class="result-line"><span class="result-label">xG ${nameB}</span><span class="result-value">${xgB.toFixed(3)}</span></div>
                </div>
            </div>

            <!-- FORMULE 2 -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#3b82f6;">📐 FORMULE 2 : xGA</span>
                    <span class="badge badge-blue">Validée</span>
                </div>
                <div class="formula-box">
                    xGA_A = (${gcA.toFixed(1)} × ${gsB.toFixed(1)} + ${gsB.toFixed(1)}) / 2 = ${xgaA.toFixed(3)}
                    <br>
                    xGA_B = (${gcB.toFixed(1)} × ${gsA.toFixed(1)} + ${gsA.toFixed(1)}) / 2 = ${xgaB.toFixed(3)}
                </div>
                <div class="result-box">
                    <div class="result-line"><span class="result-label">xGA ${nameA}</span><span class="result-value">${xgaA.toFixed(3)}</span></div>
                    <div class="result-line"><span class="result-label">xGA ${nameB}</span><span class="result-value">${xgaB.toFixed(3)}</span></div>
                </div>
            </div>

            <!-- FORMULE 3 -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#f59e0b;">📐 FORMULE 3 : Confrontation</span>
                    <span class="badge badge-orange">Validée</span>
                </div>
                <div class="formula-box">
                    Moyenne_xGA = (${xgaA.toFixed(3)} + ${xgaB.toFixed(3)}) / 2 = ${moyXGA.toFixed(3)}
                    <br>
                    xG_ajusté_${nameA} = ${xgA.toFixed(3)} × (${xgaB.toFixed(3)} / ${moyXGA.toFixed(3)}) = ${adjA.toFixed(3)}
                    <br>
                    xG_ajusté_${nameB} = ${xgB.toFixed(3)} × (${xgaA.toFixed(3)} / ${moyXGA.toFixed(3)}) = ${adjB.toFixed(3)}
                </div>
                <div class="result-box">
                    <div class="result-line"><span class="result-label">xG ajusté ${nameA}</span><span class="result-value orange">${adjA.toFixed(3)}</span></div>
                    <div class="result-line"><span class="result-label">xG ajusté ${nameB}</span><span class="result-value orange">${adjB.toFixed(3)}</span></div>
                    <div class="result-line" style="border-top:2px solid #1e2a3d; margin-top:4px; padding-top:8px;">
                        <span class="result-label">Différence</span>
                        <span class="result-value blue">${(adjA - adjB).toFixed(3)}</span>
                    </div>
                </div>
            </div>

            <!-- RÉSUMÉ -->
            <div style="margin-top:8px; padding:12px; background:#0f172a; border-radius:8px; border-left:3px solid #10b981;">
                <div style="font-size:13px; color:#94a3b8;">
                    <strong style="color:#e2e8f0;">📋 Résumé :</strong><br>
                    ${nameA} : xG ${xgA.toFixed(2)} → xGA ${xgaA.toFixed(2)} → ajusté ${adjA.toFixed(2)}
                    <br>
                    ${nameB} : xG ${xgB.toFixed(2)} → xGA ${xgaB.toFixed(2)} → ajusté ${adjB.toFixed(2)}
                </div>
            </div>
        `;
    }

    function loadDemo() {
        document.getElementById('nameA').value = 'POR';
        document.getElementById('goalsScoredA').value = '1.9';
        document.getElementById('goalsConcededA').value = '0.6';
        document.getElementById('nameB').value = 'UZB';
        document.getElementById('goalsScoredB').value = '1.0';
        document.getElementById('goalsConcededB').value = '1.6';
        runAnalysis();
    }

    document.getElementById('analyserBtn').addEventListener('click', runAnalysis);

    // Auto-run au chargement
    setTimeout(runAnalysis, 200);
</script>

</body>
</html>
