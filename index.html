<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test xG Global</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: Arial; padding: 20px; }
        .block { background: #0f3460; padding: 15px; margin: 10px 0; border-radius: 10px; }
        .green { background: #00ff88; color: #000; padding: 10px; text-align: center; border-radius: 8px; font-weight: bold; }
        button { padding: 15px; background: #e94560; color: #fff; border: none; border-radius: 10px; font-size: 18px; width: 100%; cursor: pointer; }

    </style>
</head>
<body>

    <h2>TEST xG GLOBAL - ESPAGNE vs ARABIE SAOUDITE</h2>
    
    <p>Espagne : <input id="a1" value="3"> <input id="a2" value="1"> <input id="a3" value="3"> <input id="a4" value="4"> <input id="a5" value="0"> <input id="a6" value="5"> <input id="a7" value="3"> <input id="a8" value="4"></p>
    <p>Arabie : <input id="b1" value="2"> <input id="b2" value="3"> <input id="b3" value="2"> <input id="b4" value="3"> <input id="b5" value="2"> <input id="b6" value="3"> <input id="b7" value="1"> <input id="b8" value="0"></p>
    
    <button onclick="tester()">TESTER</button>
    
    <div class="result" id="out"></div>

<script>
function g(id) { return parseInt(document.getElementById(id).value) || 0; }

function factorial(n) { var r = 1; for (var i = 2; i <= n; i++) r *= i; return r; }

function poisson(k, x) { if (x <= 0.001) x = 0.001; return Math.pow(x, k) * Math.exp(-x) / factorial(k); }

function off(d) {
    var p = 0;
    if (d[0]==5) p+=3; else if (d[0]==4) p+=2; else if (d[0]==3) p+=1;
    if (d[1]==5) p+=4; else if (d[1]==4) p+=3; else if (d[1]==3) p+=2; else if (d[1]==2) p+=1;
    if (d[2]==5) p+=4; else if (d[2]==4) p+=3; else if (d[2]==3) p+=1;
    if (d[3]==5) p+=5; else if (d[3]==4) p+=4; else if (d[3]==3) p+=2;
    if (d[4]==0) p+=2;
    if (d[5]==5) p+=3; else if (d[5]==4) p+=2; else if (d[5]==3) p+=1;
    if (d[6]==5) p+=3; else if (d[6]==4) p+=2; else if (d[6]==3) p+=1;
    return p;
}

function def(d) {
    var p = 0;
    if (d[0]==5) p+=3; else if (d[0]==4) p+=2; else if (d[0]==3) p+=1;
    if (d[7]==5) p+=5; else if (d[7]==4) p+=4; else if (d[7]==3) p+=3; else if (d[7]==2) p+=1;
    if (d[5]==5) p+=4; else if (d[5]==4) p+=3; else if (d[5]==3) p+=1;
    if (d[6]==5) p+=2; else if (d[6]==4) p+=1; else if (d[6]==3) p+=1;
    if (d[4]==0) p+=2; else if (d[4]==1) p-=1; else if (d[4]==2) p-=2; else if (d[4]>=3) p-=3;
    if (d[1]==0) p+=2; else if (d[1]==1) p+=1; else if (d[1]==2) p+=0; else if (d[1]==3) p-=1; else if (d[1]==4) p-=2; else if (d[1]==5) p-=3;
    if (d[2]==5) p+=2; else if (d[2]==4) p+=1; else if (d[2]==3) p+=1;
    return p;
}

function tab15(t, pct) {
    var T = {
        o: [[65,28,6,1,0,0],[50,35,12,3,0,0],[35,35,20,8,2,0],[25,30,26,13,4,2],[15,27,30,18,8,2],[10,22,28,23,12,5],[5,15,25,28,18,9]],
        d: [[5,12,22,28,20,13],[8,18,28,25,16,5],[12,25,30,20,10,3],[20,30,28,15,5,2],[28,35,22,10,4,1],[40,35,18,5,2,0],[55,30,12,3,0,0]]
    };
    var r = pct < 15 ? 0 : pct < 30 ? 1 : pct < 45 ? 2 : pct < 60 ? 3 : pct < 75 ? 4 : pct < 90 ? 5 : 6;
    return T[t][r];
}

function conditions(d) {
    var o = 0, f = 0;
    if (d[1] <= 1 && d[7] >= 3 && d[5] === 5) { o += 2; f += 5; }
    if (d[7] >= 4 && d[0] >= 4 && d[5] === 5 && d[6] >= 3) { o += 5; f += 6; }
    if (d[7] >= 4 && d[0] >= 4 && d[5] === 5 && d[3] === 4) { o += 5; f += 4; }
    if (d[0] >= 4 && d[3] >= 4 && d[7] >= 3 && d[6] >= 3) { o += 5; f += 4; }
    if (d[3] === 5 && d[0] === 5 && d[1] >= 3) { o += 6; f += 3; }
    if (d[0] === 5 && d[3] === 5 && d[2] >= 4) { o += 5; f += 5; }
    if (d[2] >= 3 && d[7] >= 2 && d[0] >= 4) { o += 4; f += 4; }
    if (d[1] >= 2 && d[4] >= 2 && d[5] <= 4) { f -= 4; }
    if (d[7] === 0 && d[4] >= 3 && d[5] <= 2) { o -= 3; f -= 5; }
    if (d[4] >= 2 && d[5] === 5) { o += 2; f += 2; }
    if (d[1] === 2 && d[4] === 1) { f += 5; }
    if (d[1] === 1 && d[4] === 1 && d[7] >= 3 && d[0] >= 3) { f += 5; }
    return [o, f];
}

function synergies(d) {
    var o = 0, f = 0;
    if (d[3] >= 4 && d[6] >= 3) o += 3;
    if (d[3] >= 4 && d[0] >= 4) o += 2;
    if (d[2] >= 4 && d[0] >= 4) o += 2;
    if (d[2] >= 4 && d[1] === 2) o += 1;
    if (d[7] >= 3 && d[5] >= 4) f += 4;
    if (d[7] >= 3 && d[0] >= 4) { o += 1; f += 2; }
    if (d[7] >= 3 && d[6] >= 3) f += 2;
    if (d[4] === 1 && d[5] >= 4) { o += 1; f += 1; }
    if (d[0] >= 4 && d[5] >= 4) { o += 1; f += 1; }
    return [o, f];
}

function tester() {
    var A = [g('a1'),g('a2'),g('a3'),g('a4'),g('a5'),g('a6'),g('a7'),g('a8')];
    var B = [g('b1'),g('b2'),g('b3'),g('b4'),g('b5'),g('b6'),g('b7'),g('b8')];
    
    var oA = off(A), dA = def(A);
    var oB = off(B), dB = def(B);
    
    var cA = conditions(A), cB = conditions(B);
    var sA = synergies(A), sB = synergies(B);
    
    oA += cA[0] + sA[0]; dA += cA[1] + sA[1];
    oB += cB[0] + sB[0]; dB += cB[1] + sB[1];
    
    var xGA = 0.2 + oA * 0.15;
    var xGAA = 2.0 - dA * 0.095; if (xGAA < 0.1) xGAA = 0.1;
    var xGB = 0.2 + oB * 0.15;
    var xGAB = 2.0 - dB * 0.095; if (xGAB < 0.1) xGAB = 0.1;
    
    var adjA = xGA * (xGAB / 2.0);
    var adjB = xGB * (xGAA / 2.0);
    
    var capA = (A[2]+A[1]+A[3]+A[0]+A[6])/25*100;
    var capB = (B[2]+B[1]+B[3]+B[0]+B[6])/25*100;
    
    var tAo = tab15('o', capA), tBo = tab15('o', capB);
    
    var pA = [], pB = [];
    var sumA = 0, sumB = 0;
    for (var k = 0; k < 6; k++) {
        var vA = (poisson(k, adjA)*100 + tAo[k]) / 2;
        var vB = (poisson(k, adjB)*100 + tBo[k]) / 2;
        pA.push(vA); sumA += vA;
        pB.push(vB); sumB += vB;
    }
    
    // Normaliser si somme > 100%
    if (sumA > 100) { for (var k = 0; k < 6; k++) pA[k] = pA[k] * 100 / sumA; }
    if (sumB > 100) { for (var k = 0; k < 6; k++) pB[k] = pB[k] * 100 / sumB; }
    
    var html = '<div class="block">';
    html += '<p>Off A : ' + oA + ' | Def A : ' + dA + '</p>';
    html += '<p>Off B : ' + oB + ' | Def B : ' + dB + '</p>';
    html += '<p>xG A brut : ' + xGA.toFixed(2) + ' | xGA A : ' + xGAA.toFixed(2) + '</p>';
    html += '<p>xG B brut : ' + xGB.toFixed(2) + ' | xGA B : ' + xGAB.toFixed(2) + '</p>';
    html += '<p>xG ajusté A : ' + adjA.toFixed(2) + ' | xG ajusté B : ' + adjB.toFixed(2) + '</p>';
    html += '<p>Capacité A : ' + capA.toFixed(0) + '% | Capacité B : ' + capB.toFixed(0) + '%</p>';
    
    html += '<p><b>Probabilités A :</b> ';
    for (var k = 0; k < 6; k++) html += k + 'b:' + pA[k].toFixed(1) + '% ';
    html += '| Somme : ' + sumA.toFixed(1) + '%</p>';
    
    html += '<p><b>Probabilités B :</b> ';
    for (var k = 0; k < 6; k++) html += k + 'b:' + pB[k].toFixed(1) + '% ';
    html += '| Somme : ' + sumB.toFixed(1) + '%</p>';
    
    var p0 = pA[0]*pB[0]/10000;
    var p1 = (pA[1]*pB[0] + pA[0]*pB[1])/10000;
    var p2 = (pA[2]*pB[0] + pA[1]*pB[1] + pA[0]*pB[2])/10000;
    var p3 = (pA[3]*pB[0] + pA[2]*pB[1] + pA[1]*pB[2] + pA[0]*pB[3])/10000;
    var p4 = (pA[4]*pB[0] + pA[3]*pB[1] + pA[2]*pB[2] + pA[1]*pB[3] + pA[0]*pB[4])/10000;
    var p5 = 1 - p0 - p1 - p2 - p3 - p4;
    if (p5 < 0) p5 = 0;
    
    var sumP = p0+p1+p2+p3+p4+p5;
    
    html += '<p>P(0)=' + (p0*100).toFixed(2) + '% P(1)=' + (p1*100).toFixed(2) + '% P(2)=' + (p2*100).toFixed(2) + '% P(3)=' + (p3*100).toFixed(2) + '% P(4)=' + (p4*100).toFixed(2) + '% P(5)=' + (p5*100).toFixed(2) + '%</p>';
    html += '<p>Somme P(0..5) : ' + (sumP*100).toFixed(1) + '%</p>';
    
    var xGG = 0*p0 + 1*p1 + 2*p2 + 3*p3 + 4*p4 + 5*p5;
    var ov25 = (1-p0-p1-p2)*100;
    
    html += '<div class="green">xG Global = ' + xGG.toFixed(2) + '</div>';
    html += '<p>Over 2.5 = ' + ov25.toFixed(1) + '%</p>';
    html += '</div>';
    
    document.getElementById('out').innerHTML = html;
}
</script>
</body>
