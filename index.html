<body>
    <div class="container">

                <div class="stat-row"><label>Les deux équipes marquent</label><input type="number" id="b2" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>Plus de 2,5 buts</label><input type="number" id="b3" min="0" max="5" value="2"></div>

                <div class="stat-row"><label>Nul ou victoire</label><input type="number" id="b6" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>Vainqueur de la 1re mi-temps</label><input type="number" id="b7" min="0" max="5" value="1"></div>

    <script>
        function getVal(id) {
            var v = parseInt(document.getElementById(id).value);
            return isNaN(v) ? 0 : v;
        }
        
        function factorial(n) {
            if (n <= 1) return 1;
            return n * factorial(n - 1);
        }
        
        function poisson(k, xG) {
            if (xG <= 0) xG = 0.01;
            return (Math.pow(xG, k) * Math.exp(-xG)) / factorial(k);
        }
        
        function calcOffensive(d) {
            var pts = 0;
            if (d[0] === 5) pts += 3; else if (d[0] === 4) pts += 2; else if (d[0] === 3) pts += 1;
            if (d[5] === 5) pts += 3; else if (d[5] === 4) pts += 2; else if (d[5] === 3) pts += 1;
            if (d[6] === 5) pts += 3; else if (d[6] === 4) pts += 2; else if (d[6] === 3) pts += 1;
            if (d[4] === 0) pts += 2;
            if (d[1] === 5) pts += 4; else if (d[1] === 4) pts += 3; else if (d[1] === 3) pts += 2; else if (d[1] === 2) pts += 1;
            if (d[3] === 5) pts += 5; else if (d[3] === 4) pts += 4; else if (d[3] === 3) pts += 2;
            if (d[2] === 5) pts += 4; else if (d[2] === 4) pts += 3; else if (d[2] === 3) pts += 1;
            return pts;
        }
        
        function calcDefensive(d) {
            var pts = 0;
            if (d[0] === 5) pts += 3; else if (d[0] === 4) pts += 2; else if (d[0] === 3) pts += 1;
            if (d[7] === 5) pts += 5; else if (d[7] === 4) pts += 4; else if (d[7] === 3) pts += 3; else if (d[7] === 2) pts += 1;
            if (d[5] === 5) pts += 4; else if (d[5] === 4) pts += 3; else if (d[5] === 3) pts += 1;
            if (d[6] === 5) pts += 2; else if (d[6] === 4) pts += 1; else if (d[6] === 3) pts += 1;
            if (d[4] === 0) pts += 2; else if (d[4] === 1) pts -= 1; else if (d[4] === 2) pts -= 2; else if (d[4] >= 3) pts -= 3;
            if (d[1] === 0) pts += 2; else if (d[1] === 1) pts += 1; else if (d[1] === 2) pts += 0; else if (d[1] === 3) pts -= 1; else if (d[1] === 4) pts -= 2; else if (d[1] === 5) pts -= 3;
            if (d[2] === 5) pts += 2; else if (d[2] === 4) pts += 1; else if (d[2] === 3) pts += 1;
            return pts;
        }
        
        function table15(type, pct) {
            var tables = {
                off: [
                    [65,28,6,1,0,0], [50,35,12,3,0,0], [35,35,20,8,2,0],
                    [25,30,26,13,4,2], [15,27,30,18,8,2], [10,22,28,23,12,5], [5,15,25,28,18,9]
                ],
                def: [
                    [5,12,22,28,20,13], [8,18,28,25,16,5], [12,25,30,20,10,3],
                    [20,30,28,15,5,2], [28,35,22,10,4,1], [40,35,18,5,2,0], [55,30,12,3,0,0]
                ]
            };
            var row = 0;
            if (pct < 15) row = 0;
            else if (pct < 30) row = 1;
            else if (pct < 45) row = 2;
            else if (pct < 60) row = 3;
            else if (pct < 75) row = 4;
            else if (pct < 90) row = 5;
            else row = 6;
            return tables[type][row];
        }
        
        function conditionsSpeciales(d) {
            var off = 0, def = 0;
            var vic = d[0], btts = d[1], over = d[2], ouvre = d[3], enc = d[4], vn = d[5], mt = d[6], clean = d[7];
            if (btts <= 1 && clean >= 3 && vn === 5) { off += 2; def += 5; }
            if (clean >= 4 && vic >= 4 && vn === 5 && mt >= 3) { off += 5; def += 6; }
            if (clean >= 4 && vic >= 4 && vn === 5 && ouvre === 4) { off += 5; def += 4; }
            if (vic >= 4 && ouvre >= 4 && clean >= 3 && mt >= 3) { off += 5; def += 4; }
            if (ouvre === 5 && vic === 5 && btts >= 3) { off += 6; def += 3; }
            if (vic === 5 && ouvre === 5 && over >= 4) { off += 5; def += 5; }
            if (over >= 3 && clean >= 2 && vic >= 4) { off += 4; def += 4; }
            if (btts >= 2 && enc >= 2 && vn <= 4) { def -= 4; }
            if (clean === 0 && enc >= 3 && vn <= 2) { off -= 3; def -= 5; }
            if (enc >= 2 && vn === 5) { off += 2; def += 2; }
            if (btts === 2 && enc === 1) { def += 5; }
            if (btts === 1 && enc === 1 && clean >= 3 && vic >= 3) { def += 5; }
            return { off: off, def: def };
        }
        
        function synergies(d) {
            var off = 0, def = 0;
            var vic = d[0], btts = d[1], over = d[2], ouvre = d[3], enc = d[4], vn = d[5], mt = d[6], clean = d[7];
            if (ouvre >= 4 && mt >= 3) off += 3;
            if (ouvre >= 4 && vic >= 4) off += 2;
            if (over >= 4 && vic >= 4) off += 2;
            if (over >= 4 && btts === 2) off += 1;
            if (clean >= 3 && vn >= 4) def += 4;
            if (clean >= 3 && vic >= 4) { off += 1; def += 2; }
            if (clean >= 3 && mt >= 3) def += 2;
            if (enc === 1 && vn >= 4) { off += 1; def += 1; }
            if (vic >= 4 && vn >= 4) { off += 1; def += 1; }
            return { off: off, def: def };
        }
        
        function arrondirButs(xG) {
            if (xG < 0.5) return 0;
            if (xG < 1.5) return 1;
            if (xG < 2.5) return 2;
            if (xG < 3.5) return 3;
            if (xG < 4.5) return 4;
            return 5;
        }
        
        function analyze() {
            var A = [getVal('a1'), getVal('a2'), getVal('a3'), getVal('a4'), getVal('a5'), getVal('a6'), getVal('a7'), getVal('a8')];
            var B = [getVal('b1'), getVal('b2'), getVal('b3'), getVal('b4'), getVal('b5'), getVal('b6'), getVal('b7'), getVal('b8')];
            
            var offA = calcOffensive(A);
            var defA = calcDefensive(A);
            var offB = calcOffensive(B);
            var defB = calcDefensive(B);
            
            var condA = conditionsSpeciales(A);
            var condB = conditionsSpeciales(B);
            var synA = synergies(A);
            var synB = synergies(B);
            
            offA += condA.off + synA.off;
            defA += condA.def + synA.def;
            offB += condB.off + synB.off;
            defB += condB.def + synB.def;
            
            var xGA = 0.2 + offA * 0.15;
            var xGAA = 2.0 - defA * 0.095;
            if (xGAA < 0.1) xGAA = 0.1;
            var xGB = 0.2 + offB * 0.15;
            var xGAB = 2.0 - defB * 0.095;
            if (xGAB < 0.1) xGAB = 0.1;
            
            var xGadjA = xGA * (xGAB / 2.0);
            var xGadjB = xGB * (xGAA / 2.0);
            
            var scoreA = arrondirButs(xGadjA);
            var scoreB = arrondirButs(xGadjB);
            
            var capA = (A[2] + A[1] + A[3] + A[0] + A[6]) / 25 * 100;
            var capB = (B[2] + B[1] + B[3] + B[0] + B[6]) / 25 * 100;
            
            var tabA = table15('off', capA);
            var tabB = table15('off', capB);
            
            var probA = [], probB = [];
            for (var k = 0; k < 6; k++) {
                probA.push(Math.round(((poisson(k, xGadjA) * 100) + tabA[k]) / 2 * 10) / 10);
                probB.push(Math.round(((poisson(k, xGadjB) * 100) + tabB[k]) / 2 * 10) / 10);
            }
            
            var defCapA = (A[7] + (5 - A[1]) + (5 - A[4]) + A[5]) / 20 * 100;
            var defCapB = (B[7] + (5 - B[1]) + (5 - B[4]) + B[5]) / 20 * 100;
            
            var encA = table15('def', defCapA);
            var encB = table15('def', defCapB);
            
            var croisA = [], croisB = [];
            for (var k = 0; k < 4; k++) {
                croisA.push(Math.round((probA[k] * encB[k]) / 100 * 10) / 10);
                croisB.push(Math.round((probB[k] * encA[k]) / 100 * 10) / 10);
            }
            
            var btts = Math.round((probA[1] + probB[1]) / 2 * 10) / 10;
            
            var p0 = probA[0] * probB[0] / 100;
            var p1 = (probA[1] * probB[0] + probA[0] * probB[1]) / 100;
            var p2 = (probA[2] * probB[0] + probA[1] * probB[1] + probA[0] * probB[2]) / 100;
            var p3 = (probA[3] * probB[0] + probA[2] * probB[1] + probA[1] * probB[2] + probA[0] * probB[3]) / 100;
            
            var over05 = Math.round((1 - p0) * 1000) / 10;
            var over15 = Math.round((1 - p0 - p1) * 1000) / 10;
            var over25 = Math.round((1 - p0 - p1 - p2) * 1000) / 10;
            var over35 = Math.round((1 - p0 - p1 - p2 - p3) * 1000) / 10;
            
            var xGGlobal = Math.round((0 * p0 + 1 * p1 + 2 * p2 + 3 * p3 + 4 * (1 - p0 - p1 - p2 - p3)) * 100) / 100;
            
            var scores = [];
            for (var i = 0; i < 4; i++) {
                for (var j = 0; j < 4; j++) {
                    scores.push({ i: i, j: j, p: Math.round(probA[i] * probB[j]) / 100 });
                }
            }
            scores.sort(function(a, b) { return b.p - a.p; });
            var top3 = scores.slice(0, 3);
            
            var diff = offA - offB;
            var vA, vN, vB;
            if (diff > 20) { vA = 75; vN = 18; vB = 7; }
            else if (diff >= 15) { vA = 70; vN = 20; vB = 10; }
            else if (diff >= 10) { vA = 60; vN = 25; vB = 15; }
            else if (diff >= 5) { vA = 50; vN = 30; vB = 20; }
            else if (diff >= 0) { vA = 40; vN = 33; vB = 27; }
            else if (diff >= -4) { vA = 27; vN = 33; vB = 40; }
            else if (diff >= -9) { vA = 20; vN = 30; vB = 50; }
            else if (diff >= -14) { vA = 15; vN = 25; vB = 60; }
            else if (diff >= -20) { vA = 10; vN = 20; vB = 70; }
            else { vA = 7; vN = 18; vB = 75; }
            
            var firstA = Math.round((A[3] + A[6]) / (A[3] + A[6] + B[3] + B[6]) * 100);
            var firstB = 100 - firstA;
            
            var cote1 = Math.round(100 / vA * 100) / 100;
            var coteN = Math.round(100 / vN * 100) / 100;
            var cote2 = Math.round(100 / vB * 100) / 100;
            var coteOver = Math.round(100 / over25 * 100) / 100;
            var coteBTTS = Math.round(100 / btts * 100) / 100;
            
            var highlightA = -1, highlightB = -1;
            for (var k = 0; k < 4; k++) {
                if (Math.abs(probA[k] - encB[k]) <= 5 && probA[k] > 10 && highlightA === -1) highlightA = k;
                if (Math.abs(probB[k] - encA[k]) <= 5 && probB[k] > 10 && highlightB === -1) highlightB = k;
            }
            
            var signal = '';
            var hasSignal = false;
            if (Math.abs(probA[1] - probB[1]) <= 5) {
                var hasBTTS = false;
                for (var s = 0; s < top3.length; s++) {
                    if (top3[s].i >= 1 && top3[s].j >= 1) { hasBTTS = true; break; }
                }
                if (hasBTTS) {
                    signal = '🔵 MIROIR DE MARQUER : Équipe A ' + probA[1] + '% • Équipe B ' + probB[1] + '% | Score BTTS dans le top 3';
                    hasSignal = true;
                }
            }
            
            var html = '';
            html += '<div class="xgglobal">🟢 xG GLOBAL : ' + xGGlobal.toFixed(2) + '</div>';
            
            html += '<div class="block">';
            html += '<h3>📊 xG DU MATCH</h3>';
            html += '<p>Équipe A : ' + xGA.toFixed(2) + ' × (' + xGAB.toFixed(2) + '/2.0) = ' + xGadjA.toFixed(2) + '<br>';
            html += 'Équipe B : ' + xGB.toFixed(2) + ' × (' + xGAA.toFixed(2) + '/2.0) = ' + xGadjB.toFixed(2) + '<br>';
            html += '🎯 SCORE PROBABLE : ' + scoreA + '-' + scoreB + '</p>';
            html += '</div>';
            
            html += '<div class="block">';
            html += '<h3>📈 PROBABILITÉS</h3>';
            html += '<p>🏆 1N2 : Équipe A ' + vA + '% | Nul ' + vN + '% | Équipe B ' + vB + '%<br>';
            html += '📈 OVER 2.5 : ' + over25 + '% | ⚽ BTTS : ' + btts + '%<br>';
            html += '⏱️ 1ER BUT : Équipe A ' + firstA + '% | Équipe B ' + firstB + '%</p>';
            html += '</div>';
            
            html += '<div class="block">';
            html += '<h3>💰 CÔTES</h3>';
            html += '<p>1 : ' + cote1 + ' | N : ' + coteN + ' | 2 : ' + cote2 + ' | Over 2.5 : ' + coteOver + ' | BTTS : ' + coteBTTS + '</p>';
            html += '</div>';
            
            html += '<div class="block">';
            html += '<h3>🔄 CROISEMENT</h3>';
            html += '<p style="font-size:11px;color:#aaa;">Équipe A</p>';
            html += '<table class="croisement-table">';
            html += '<tr><th>Buts</th><th>Marque</th><th>B encaisse</th><th>Croisement</th></tr>';
            for (var k = 0; k < 4; k++) {
                var cls = (highlightA === k) ? ' class="highlight-a"' : '';
                html += '<tr' + cls + '><td>' + k + '</td><td>' + probA[k] + '%</td><td>' + encB[k] + '%</td><td>' + croisA[k] + '%</td></tr>';
            }
            html += '</table>';
            html += '<p style="font-size:11px;color:#aaa;margin-top:8px;">Équipe B</p>';
            html += '<table class="croisement-table">';
            html += '<tr><th>Buts</th><th>Marque</th><th>A encaisse</th><th>Croisement</th></tr>';
            for (var k = 0; k < 4; k++) {
                var cls = (highlightB === k) ? ' class="highlight-b"' : '';
                html += '<tr' + cls + '><td>' + k + '</td><td>' + probB[k] + '%</td><td>' + encA[k] + '%</td><td>' + croisB[k] + '%</td></tr>';
            }
            html += '</table>';
            html += '<p style="font-size:10px;margin-top:4px;">🟠 = A trouve chemin dans B | 🔵 = B trouve chemin dans A</p>';
            html += '</div>';
            
            html += '<div class="block">';
            html += '<h3>🎯 TOP 3 SCORES</h3>';
            html += '<p class="top3">';
            for (var s = 0; s < top3.length; s++) {
                html += top3[s].i + '-' + top3[s].j + ' : ' + (top3[s].p * 100).toFixed(1) + '%';
                if (s < 2) html += ' | ';
            }
            html += '</p>';
            html += '</div>';
            
            if (hasSignal) {
                html += '<div class="signal">' + signal + '</div>';
            }
            
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').className = 'result active';
        }
    </script>
</body>
