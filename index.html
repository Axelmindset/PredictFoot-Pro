<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test xG - Étapes 1 à 10</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 4px;
        }
        .card {
            background: #141c2b;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #1e2a3d;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title i { color: #10b981; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field-group { margin-bottom: 12px; }
        .field-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .field-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #1e2a3d;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 16px;
            font-weight: 500;
            transition: border 0.2s;
        }
        .field-group input:focus {
            border-color: #10b981;
            outline: none;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            width: 100%;
            justify-content: center;
            padding: 14px;
        }
        .btn-secondary {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #2d3a4f;
            width: 100%;
            justify-content: center;
            padding: 14px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-group .btn { flex: 1; }
        .result-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1e2a3d;
            margin-top: 12px;
        }
        .result-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e2a3d;
            font-size: 15px;
        }
        .result-line:last-child { border-bottom: none; }
        .result-label { color: #94a3b8; }
        .result-value { font-weight: 600; color: #10b981; }
        .result-value.orange { color: #f59e0b; }
        .result-value.blue { color: #3b82f6; }
        .result-value.pink { color: #ec4899; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge-green { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid #10b981; }
        .badge-blue { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .badge-orange { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid #f59e0b; }
        .badge-pink { background: rgba(236,72,153,0.2); color: #ec4899; border: 1px solid #ec4899; }
        .formula-box {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #94a3b8;
            border-left: 3px solid #10b981;
        }
        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚽ Test xG · 1N2 · BTTS</h1>
        <p>Étapes 1 à 10</p>
    </div>

    <!-- ===== SAISIE ===== -->
    <div class="card">
        <div class="card-title"><i>📊</i> Données du match</div>
        <div class="grid-2">
            <div>
                <div class="field-group"><label>🏠 Équipe A</label><input type="text" id="nameA" value="POR" /></div>
                <div class="field-group"><label>Buts marqués / match</label><input type="number" id="goalsScoredA" value="1.9" step="0.1" /></div>
                <div class="field-group"><label>Buts encaissés / match</label><input type="number" id="goalsConcededA" value="0.6" step="0.1" /></div>
            </div>
            <div>
                <div class="field-group"><label>✈️ Équipe B</label><input type="text" id="nameB" value="UZB" /></div>
                <div class="field-group"><label>Buts marqués / match</label><input type="number" id="goalsScoredB" value="1.0" step="0.1" /></div>
                <div class="field-group"><label>Buts encaissés / match</label><input type="number" id="goalsConcededB" value="1.6" step="0.1" /></div>
            </div>
        </div>
        <div style="margin-top:16px;">
            <button class="btn btn-primary" id="analyserBtn">🚀 Calculer</button>
        </div>
        <div style="margin-top:10px;">
            <button class="btn btn-secondary" onclick="loadDemo()">⚡ Charger démo (POR vs UZB)</button>
        </div>
    </div>

    <!-- ===== RÉSULTATS ===== -->
    <div id="results">
        <div class="card">
            <div class="card-title"><i>📐</i> Résultats</div>
            <div id="resultContainer"></div>
        </div>
    </div>

</div>

<script>
    // ============================================================
    //  FORMULES 1 À 10
    // ============================================================

    // ÉTAPE 1 : xG
    function computeXG(goalsScoredA, goalsConcededB, goalsScoredB, goalsConcededA) {
        const xgA = (goalsScoredA * goalsConcededB + goalsConcededB) / 2;
        const xgB = (goalsScoredB * goalsConcededA + goalsConcededA) / 2;
        return { xgA, xgB };
    }

    // ÉTAPE 2 : xGA
    function computeXGA(goalsConcededA, goalsScoredB, goalsConcededB, goalsScoredA) {
        const xgaA = (goalsConcededA * goalsScoredB + goalsScoredB) / 2;
        const xgaB = (goalsConcededB * goalsScoredA + goalsScoredA) / 2;
        return { xgaA, xgaB };
    }

    // ÉTAPE 3 : Confrontation
    function confront(xgA, xgB, xgaA, xgaB) {
        const moyXGA = (xgaA + xgaB) / 2;
        const adjA = xgA * (xgaB / moyXGA);
        const adjB = xgB * (xgaA / moyXGA);
        return { adjA, adjB, moyXGA };
    }

    // ÉTAPE 4 : Capacité offensive
    function computeCapacite(xgA, xgB) {
        const capA = xgA / (xgA + xgB);
        const capB = xgB / (xgA + xgB);
        return { capA, capB };
    }

    // ÉTAPE 5 : Tableau 15 (limité à 5 buts)
    function getTableau15(capacite) {
        const table = [
            { max: 14, probs: [0.85, 0.12, 0.02, 0.01, 0, 0] },
            { max: 29, probs: [0.75, 0.18, 0.05, 0.02, 0, 0] },
            { max: 44, probs: [0.65, 0.22, 0.09, 0.03, 0.01, 0] },
            { max: 59, probs: [0.55, 0.25, 0.13, 0.05, 0.02, 0] },
            { max: 74, probs: [0.45, 0.27, 0.16, 0.08, 0.03, 0.01] },
            { max: 89, probs: [0.38, 0.28, 0.18, 0.10, 0.04, 0.02] },
            { max: 100, probs: [0.32, 0.28, 0.20, 0.12, 0.05, 0.03] }
        ];
        const pct = Math.min(100, capacite * 100);
        for (let row of table) {
            if (pct <= row.max) return row.probs;
        }
        return table[table.length - 1].probs;
    }

    // ÉTAPE 6 : Loi de Poisson (limitée à 5 buts)
    function poisson(lambda, k) {
        if (k === 0) return Math.exp(-lambda);
        let fact = 1;
        for (let i = 2; i <= k; i++) fact *= i;
        return Math.pow(lambda, k) * Math.exp(-lambda) / fact;
    }

    function poissonProbs(lambda) {
        const probs = [];
        for (let k = 0; k <= 5; k++) {
            probs.push(poisson(lambda, k));
        }
        return probs;
    }

    // ÉTAPE 7 : Moyenne pondérée (75% Poisson / 25% Tableau 15)
    function combineProbs(poissonProbs, tableauProbs) {
        return poissonProbs.map((p, i) => (p * 0.75) + (tableauProbs[i] * 0.25));
    }

    // ============================================================
    //  ANALYSE COMPLÈTE (ÉTAPES 1 À 10)
    // ============================================================

    function analyzeMatch(nameA, nameB, goalsScoredA, goalsConcededA, goalsScoredB, goalsConcededB) {
        // Étape 1
        const { xgA, xgB } = computeXG(goalsScoredA, goalsConcededB, goalsScoredB, goalsConcededA);
        // Étape 2
        const { xgaA, xgaB } = computeXGA(goalsConcededA, goalsScoredB, goalsConcededB, goalsScoredA);
        // Étape 3
        const { adjA, adjB, moyXGA } = confront(xgA, xgB, xgaA, xgaB);
        // Étape 4
        const { capA, capB } = computeCapacite(xgA, xgB);
        // Étape 5
        const tabA = getTableau15(capA);
        const tabB = getTableau15(capB);
        // Étape 6
        const poissonA = poissonProbs(adjA);
        const poissonB = poissonProbs(adjB);
        // Étape 7
        const finalA = combineProbs(poissonA, tabA);
        const finalB = combineProbs(poissonB, tabB);

        // Étape 8 : 1N2
        let winA = 0, draw = 0, winB = 0;
        for (let i = 0; i <= 5; i++) {
            for (let j = 0; j <= 5; j++) {
                const prob = finalA[i] * finalB[j];
                if (i > j) winA += prob;
                else if (i === j) draw += prob;
                else winB += prob;
            }
        }

        // Étape 9 : Over 2.5
        let under25 = 0;
        for (let i = 0; i <= 2; i++) {
            for (let j = 0; j <= 2; j++) {
                if (i + j <= 2) under25 += finalA[i] * finalB[j];
            }
        }
        const over25 = 1 - under25;

        // Étape 10 : BTTS
        const probA1 = 1 - finalA[0];
        const probB1 = 1 - finalB[0];
        const btts = probA1 * probB1;

        // Top 3 scores
        const scores = [];
        for (let i = 0; i <= 5; i++) {
            for (let j = 0; j <= 5; j++) {
                const prob = finalA[i] * finalB[j];
                if (prob > 0.001) scores.push({ score: `${i}-${j}`, prob });
            }
        }
        scores.sort((a, b) => b.prob - a.prob);
        const top3 = scores.slice(0, 3);

        // Côtes
        const odds = {
            winA: 1 / winA,
            draw: 1 / draw,
            winB: 1 / winB,
            over25: 1 / over25,
            btts: 1 / btts
        };

        return {
            xgA, xgB, xgaA, xgaB, adjA, adjB, moyXGA,
            capA, capB,
            tabA, tabB,
            poissonA, poissonB,
            finalA, finalB,
            winA, draw, winB,
            over25, under25,
            btts,
            top3,
            odds,
            nameA, nameB,
            goalsScoredA, goalsConcededA, goalsScoredB, goalsConcededB,
            adjA, adjB // xG ajustés
        };
    }

    // ============================================================
    //  INTERFACE
    // ============================================================

    function getValues() {
        const nameA = document.getElementById('nameA').value.trim() || 'A';
        const nameB = document.getElementById('nameB').value.trim() || 'B';
        const gsA = parseFloat(document.getElementById('goalsScoredA').value) || 0;
        const gcA = parseFloat(document.getElementById('goalsConcededA').value) || 0;
        const gsB = parseFloat(document.getElementById('goalsScoredB').value) || 0;
        const gcB = parseFloat(document.getElementById('goalsConcededB').value) || 0;
        return { nameA, nameB, gsA, gcA, gsB, gcB };
    }

    function runAnalysis() {
        const { nameA, nameB, gsA, gcA, gsB, gcB } = getValues();
        const r = analyzeMatch(nameA, nameB, gsA, gcA, gsB, gcB);

        const container = document.getElementById('resultContainer');
        container.innerHTML = `

            <!-- ===== ÉTAPES 1-3 ===== -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#10b981;">📐 ÉTAPES 1-3 : xG, xGA, Confrontation</span>
                    <span class="badge badge-green">Validées</span>
                </div>
                <div class="formula-box">
                    xG_${nameA} = ${r.xgA.toFixed(3)} | xG_${nameB} = ${r.xgB.toFixed(3)}
                    <br>
                    xGA_${nameA} = ${r.xgaA.toFixed(3)} | xGA_${nameB} = ${r.xgaB.toFixed(3)}
                    <br>
                    Moyenne_xGA = ${r.moyXGA.toFixed(3)}
                    <br>
                    xG_ajusté_${nameA} = ${r.adjA.toFixed(3)} | xG_ajusté_${nameB} = ${r.adjB.toFixed(3)}
                </div>
            </div>

            <!-- ===== ÉTAPES 4-6 ===== -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#3b82f6;">📐 ÉTAPES 4-6 : Capacité, Tableau 15, Poisson</span>
                    <span class="badge badge-blue">Validées</span>
                </div>
                <div class="formula-box">
                    Capacité_${nameA} = ${(r.capA * 100).toFixed(1)}% | Capacité_${nameB} = ${(r.capB * 100).toFixed(1)}%
                    <br><br>
                    Tableau 15 ${nameA} (${(r.capA * 100).toFixed(1)}%) : ${r.tabA.map((p, i) => `${i} but: ${(p*100).toFixed(1)}%`).join(' | ')}
                    <br>
                    Tableau 15 ${nameB} (${(r.capB * 100).toFixed(1)}%) : ${r.tabB.map((p, i) => `${i} but: ${(p*100).toFixed(1)}%`).join(' | ')}
                    <br><br>
                    Poisson ${nameA} (λ=${r.adjA.toFixed(3)}) : ${r.poissonA.map((p, i) => `${i} but: ${(p*100).toFixed(1)}%`).join(' | ')}
                    <br>
                    Poisson ${nameB} (λ=${r.adjB.toFixed(3)}) : ${r.poissonB.map((p, i) => `${i} but: ${(p*100).toFixed(1)}%`).join(' | ')}
                </div>
            </div>

            <!-- ===== ÉTAPE 7 ===== -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#f59e0b;">📐 ÉTAPE 7 : Moyenne pondérée (75/25)</span>
                    <span class="badge badge-orange">Validée</span>
                </div>
                <div class="formula-box">
                    ${nameA} : ${r.finalA.map((p, i) => `${i} but: ${(p*100).toFixed(1)}%`).join(' | ')}
                    <br>
                    ${nameB} : ${r.finalB.map((p, i) => `${i} but: ${(p*100).toFixed(1)}%`).join(' | ')}
                </div>
            </div>

            <!-- ===== ÉTAPES 8-10 ===== -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#ec4899;">📐 ÉTAPES 8-10 : 1N2, Over 2.5, BTTS</span>
                    <span class="badge badge-pink">Validées</span>
                </div>
                <div class="result-box">
                    <div class="result-line"><span class="result-label">🏆 Victoire ${nameA}</span><span class="result-value">${(r.winA * 100).toFixed(1)}%</span></div>
                    <div class="result-line"><span class="result-label">🤝 Nul</span><span class="result-value">${(r.draw * 100).toFixed(1)}%</span></div>
                    <div class="result-line"><span class="result-label">🏆 Victoire ${nameB}</span><span class="result-value">${(r.winB * 100).toFixed(1)}%</span></div>
                    <div class="result-line" style="border-top:2px solid #1e2a3d; margin-top:4px; padding-top:8px;">
                        <span class="result-label">📈 Over 2.5</span>
                        <span class="result-value orange">${(r.over25 * 100).toFixed(1)}%</span>
                    </div>
                    <div class="result-line">
                        <span class="result-label">⚽ BTTS</span>
                        <span class="result-value pink">${(r.btts * 100).toFixed(1)}%</span>
                    </div>
                </div>
            </div>

            <!-- ===== TOP 3 ===== -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#10b981;">🎯 TOP 3 SCORES</span>
                    <span class="badge badge-green">Validé</span>
                </div>
                <div class="result-box">
                    ${r.top3.map((s, i) => `
                        <div class="result-line"><span class="result-label">#${i+1}</span><span class="result-value">${s.score}</span><span class="result-value">${(s.prob * 100).toFixed(1)}%</span></div>
                    `).join('')}
                </div>
            </div>

            <!-- ===== CÔTES ===== -->
            <div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600; color:#3b82f6;">💰 CÔTES</span>
                    <span class="badge badge-blue">Validé</span>
                </div>
                <div class="result-box">
                    <div class="result-line"><span class="result-label">1 (${nameA})</span><span class="result-value">${r.odds.winA.toFixed(2)}</span></div>
                    <div class="result-line"><span class="result-label">Nul</span><span class="result-value">${r.odds.draw.toFixed(2)}</span></div>
                    <div class="result-line"><span class="result-label">2 (${nameB})</span><span class="result-value">${r.odds.winB.toFixed(2)}</span></div>
                    <div class="result-line"><span class="result-label">Over 2.5</span><span class="result-value">${r.odds.over25.toFixed(2)}</span></div>
                    <div class="result-line"><span class="result-label">BTTS</span><span class="result-value">${r.odds.btts.toFixed(2)}</span></div>
                </div>
            </div>

            <!-- ===== RÉSUMÉ ===== -->
            <div style="margin-top:8px; padding:12px; background:#0f172a; border-radius:8px; border-left:3px solid #10b981;">
                <div style="font-size:13px; color:#94a3b8;">
                    <strong style="color:#e2e8f0;">📋 RÉSUMÉ :</strong><br>
                    ${nameA} : xG ${r.xgA.toFixed(2)} → ajusté ${r.adjA.toFixed(2)} (${(r.capA*100).toFixed(1)}%)
                    <br>
                    ${nameB} : xG ${r.xgB.toFixed(2)} → ajusté ${r.adjB.toFixed(2)} (${(r.capB*100).toFixed(1)}%)
                    <br><br>
                    🏆 1N2 : ${nameA} ${(r.winA*100).toFixed(1)}% | Nul ${(r.draw*100).toFixed(1)}% | ${nameB} ${(r.winB*100).toFixed(1)}%
                    <br>
                    📈 Over 2.5 : ${(r.over25*100).toFixed(1)}% | ⚽ BTTS : ${(r.btts*100).toFixed(1)}%
                    <br>
                    🎯 Top 3 : ${r.top3.map(s => `${s.score} (${(s.prob*100).toFixed(1)}%)`).join(' | ')}
                </div>
            </div>
        `;
    }

    function loadDemo() {
        document.getElementById('nameA').value = 'POR';
        document.getElementById('goalsScoredA').value = '1.9';
        document.getElementById('goalsConcededA').value = '0.6';
        document.getElementById('nameB').value = 'UZB';
        document.getElementById('goalsScoredB').value = '1.0';
        document.getElementById('goalsConcededB').value = '1.6';
        runAnalysis();
    }

    document.getElementById('analyserBtn').addEventListener('click', runAnalysis);

    // Auto-run au chargement
    setTimeout(runAnalysis, 200);
</script>
</body>
</html>
