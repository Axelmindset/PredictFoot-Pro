<body>
    <div class="container">
        <h1>⚽ ANALYSE DE MATCH - xG SYSTEM</h1>
        
        <div class="match-input">
            <div class="team-card">
                <h2>🅰️ Équipe A</h2>
                <div class="stat-row"><label>1. A gagné le match</label><input type="number" id="a1" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>2. Les deux équipes marquent</label><input type="number" id="a2" min="0" max="5" value="1"></div>
                <div class="stat-row"><label>3. Plus de 2,5 buts</label><input type="number" id="a3" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>4. Marquera le premier but</label><input type="number" id="a4" min="0" max="5" value="4"></div>
                <div class="stat-row"><label>5. A encaissé le premier but</label><input type="number" id="a5" min="0" max="5" value="0"></div>
                <div class="stat-row"><label>6. Nul ou victoire</label><input type="number" id="a6" min="0" max="5" value="5"></div>
                <div class="stat-row"><label>7. Vainqueur de la 1re mi-temps</label><input type="number" id="a7" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>8. Clean sheets</label><input type="number" id="a8" min="0" max="5" value="4"></div>
            </div>
            
            <div class="team-card">
                <h2 class="team-b">🅱️ Équipe B</h2>
                <div class="stat-row"><label>1. A gagné le match</label><input type="number" id="b1" min="0" max="5" value="2"></div>
                <div class="stat-row"><label>2. Les deux équipes marquent</label><input type="number" id="b2" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>3. Plus de 2,5 buts</label><input type="number" id="b3" min="0" max="5" value="2"></div>
                <div class="stat-row"><label>4. Marquera le premier but</label><input type="number" id="b4" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>5. A encaissé le premier but</label><input type="number" id="b5" min="0" max="5" value="2"></div>
                <div class="stat-row"><label>6. Nul ou victoire</label><input type="number" id="b6" min="0" max="5" value="3"></div>
                <div class="stat-row"><label>7. Vainqueur de la 1re mi-temps</label><input type="number" id="b7" min="0" max="5" value="1"></div>
                <div class="stat-row"><label>8. Clean sheets</label><input type="number" id="b8" min="0" max="5" value="0"></div>
            </div>
            
            <button class="btn-analyze" onclick="analyze()">🔍 ANALYSER LE MATCH</button>
        </div>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        function getVal(id) { return parseInt(document.getElementById(id).value) || 0; }
        
        function poisson(k, xG) {
            if (xG <= 0) xG = 0.01;
            return (Math.pow(xG, k) * Math.exp(-xG)) / factorial(k);
        }
        
        function factorial(n) {
            if (n <= 1) return 1;
            return n * factorial(n - 1);
        }
        
        function calcOffensive(vic, clean, vn, mt, enc, btts, ouvre, over) {
            let pts = 0;
            const bar = {
                vic: [0,0,0,1,2,3], vn: [0,0,0,1,2,3], mt: [0,0,0,1,2,3],
                enc: [2,0,0,0,0,0], btts: [0,0,1,2,3,4], ouvre: [0,0,0,2,4,5], over: [0,0,0,1,3,4]
            };
            pts += bar.vic[vic] || 0;
            pts += bar.vn[vn] || 0;
            pts += bar.mt[mt] || 0;
            pts += bar.enc[enc] || 0;
            pts += bar.btts[btts] || 0;
            pts += bar.ouvre[ouvre] || 0;
            pts += bar.over[over] || 0;
            return pts;
        }
        
        function calcDefensive(vic, clean, vn, mt, enc, btts, ouvre, over) {
            let pts = 0;
            const bar = {
                vic: [0,0,0,1,2,3], clean: [0,0,1,3,4,5], vn: [0,0,0,1,3,4], mt: [0,0,0,1,1,2],
                enc: [2,0,-1,-2,-3,-3], btts: [2,1,0,-1,-2,-3], over: [0,0,0,1,1,2]
            };
            pts += bar.vic[vic] || 0;
            pts += bar.clean[clean] || 0;
            pts += bar.vn[vn] || 0;
            pts += bar.mt[mt] || 0;
            pts += bar.enc[enc] || 0;
            pts += bar.btts[btts] || 0;
            pts += bar.over[over] || 0;
            return pts;
        }
        
        function table15(t, pct) {
            const tables = {
                off: [
                    [65,28,6,1,0,0], [50,35,12,3,0,0], [35,35,20,8,2,0],
                    [25,30,26,13,4,2], [15,27,30,18,8,2], [10,22,28,23,12,5], [5,15,25,28,18,9]
                ],
                def: [
                    [5,12,22,28,20,13], [8,18,28,25,16,5], [12,25,30,20,10,3],
                    [20,30,28,15,5,2], [28,35,22,10,4,1], [40,35,18,5,2,0], [55,30,12,3,0,0]
                ]
            };
            let row = 0;
            if (pct < 15) row = 0;
            else if (pct < 30) row = 1;
            else if (pct < 45) row = 2;
            else if (pct < 60) row = 3;
            else if (pct < 75) row = 4;
            else if (pct < 90) row = 5;
            else row = 6;
            return tables[t][row];
        }
        
        function conditionsSpeciales(vic, btts, over, ouvre, enc, vn, mt, clean) {
            let off = 0, def = 0;
            if (btts <= 1 && clean >= 3 && vn === 5) { off += 2; def += 5; }
            if (clean >= 4 && vic >= 4 && vn === 5 && mt >= 3) { off += 5; def += 6; }
            if (clean >= 4 && vic >= 4 && vn === 5 && ouvre === 4) { off += 5; def += 4; }
            if (vic >= 4 && ouvre >= 4 && clean >= 3 && mt >= 3) { off += 5; def += 4; }
            if (ouvre === 5 && vic === 5 && btts >= 3) { off += 6; def += 3; }
            if (vic === 5 && ouvre === 5 && over >= 4) { off += 5; def += 5; }
            if (over >= 3 && clean >= 2 && vic >= 4) { off += 4; def += 4; }
            if (btts >= 2 && enc >= 2 && vn <= 4) { def -= 4; }
            if (clean === 0 && enc >= 3 && vn <= 2) { off -= 3; def -= 5; }
            if (enc >= 2 && vn === 5) { off += 2; def += 2; }
            if (btts === 2 && enc === 1) { def += 5; }
            if (btts === 1 && enc === 1 && clean >= 3 && vic >= 3) { def += 5; }
            return { off, def };
        }
        
        function synergies(vic, btts, over, ouvre, enc, vn, mt, clean) {
            let off = 0, def = 0;
            if (ouvre >= 4 && mt >= 3) off += 3;
            if (ouvre >= 4 && vic >= 4) off += 2;
            if (over >= 4 && vic >= 4) off += 2;
            if (over >= 4 && btts === 2) off += 1;
            if (clean >= 3 && vn >= 4) def += 4;
            if (clean >= 3 && vic >= 4) { off += 1; def += 2; }
            if (clean >= 3 && mt >= 3) def += 2;
            if (enc === 1 && vn >= 4) { off += 1; def += 1; }
            if (vic >= 4 && vn >= 4) { off += 1; def += 1; }
            return { off, def };
        }
        
        function arrondirButs(xG) {
            if (xG < 0.5) return 0;
            if (xG < 1.5) return 1;
            if (xG < 2.5) return 2;
            if (xG < 3.5) return 3;
            if (xG < 4.5) return 4;
            return 5;
        }
        
        function analyze() {
            const A = [getVal('a1'), getVal('a2'), getVal('a3'), getVal('a4'), getVal('a5'), getVal('a6'), getVal('a7'), getVal('a8')];
            const B = [getVal('b1'), getVal('b2'), getVal('b3'), getVal('b4'), getVal('b5'), getVal('b6'), getVal('b7'), getVal('b8')];
            
            const [vicA, bttsA, overA, ouvreA, encA, vnA, mtA, cleanA] = A;
            const [vicB, bttsB, overB, ouvreB, encB, vnB, mtB, cleanB] = B;
            
            let offA = calcOffensive(vicA, cleanA, vnA, mtA, encA, bttsA, ouvreA, overA);
            let defA = calcDefensive(vicA, cleanA, vnA, mtA, encA, bttsA, ouvreA, overA);
            let offB = calcOffensive(vicB, cleanB, vnB, mtB, encB, bttsB, ouvreB, overB);
            let defB = calcDefensive(vicB, cleanB, vnB, mtB, encB, bttsB, ouvreB, overB);
            
            const condA = conditionsSpeciales(vicA, bttsA, overA, ouvreA, encA, vnA, mtA, cleanA);
            const condB = conditionsSpeciales(vicB, bttsB, overB, ouvreB, encB, vnB, mtB, cleanB);
            const synA = synergies(vicA, bttsA, overA, ouvreA, encA, vnA, mtA, cleanA);
            const synB = synergies(vicB, bttsB, overB, ouvreB, encB, vnB, mtB, cleanB);
            
            offA += condA.off + synA.off;
            defA += condA.def + synA.def;
            offB += condB.off + synB.off;
            defB += condB.def + synB.def;
            
            let xGA = 0.2 + offA * 0.15;
            let xGAA = 2.0 - defA * 0.095;
            if (xGAA < 0.1) xGAA = 0.1;
            let xGB = 0.2 + offB * 0.15;
            let xGAB = 2.0 - defB * 0.095;
            if (xGAB < 0.1) xGAB = 0.1;
            
            let xGadjA = xGA * (xGAB / 2.0);
            let xGadjB = xGB * (xGAA / 2.0);
            
            let scoreA = arrondirButs(xGadjA);
            let scoreB = arrondirButs(xGadjB);
            
            let capA = (overA + bttsA + ouvreA + vicA + mtA) / 25 * 100;
            let capB = (overB + bttsB + ouvreB + vicB + mtB) / 25 * 100;
            
            let tabA = table15('off', capA);
            let tabB = table15('off', capB);
            
            let probA = [], probB = [];
            for (let k = 0; k < 6; k++) {
                probA.push(Math.round(((poisson(k, xGadjA) * 100) + tabA[k]) / 2 * 10) / 10);
                probB.push(Math.round(((poisson(k, xGadjB) * 100) + tabB[k]) / 2 * 10) / 10);
            }
            
            let defCapA = (cleanA + (5 - bttsA) + (5 - encA) + vnA) / 20 * 100;
            let defCapB = (cleanB + (5 - bttsB) + (5 - encB) + vnB) / 20 * 100;
            
            let encA = table15('def', defCapA);
            let encB = table15('def', defCapB);
            
            let croisA = [], croisB = [];
            for (let k = 0; k < 4; k++) {
                croisA.push(Math.round((probA[k] * encB[k]) / 100 * 10) / 10);
                croisB.push(Math.round((probB[k] * encA[k]) / 100 * 10) / 10);
            }
            
            let btts = Math.round((probA[1] + probB[1]) / 2 * 10) / 10;
            
            let p0 = Math.round(probA[0] * probB[0]) / 100;
            let p1 = (probA[1] * probB[0] + probA[0] * probB[1]) / 100;
            let p2 = (probA[2] * probB[0] + probA[1] * probB[1] + probA[0] * probB[2]) / 100;
            let p3 = (probA[3] * probB[0] + probA[2] * probB[1] + probA[1] * probB[2] + probA[0] * probB[3]) / 100;
            
            let over05 = Math.round((1 - p0) * 1000) / 10;
            let over15 = Math.round((1 - p0 - p1) * 1000) / 10;
            let over25 = Math.round((1 - p0 - p1 - p2) * 1000) / 10;
            let over35 = Math.round((1 - p0 - p1 - p2 - p3) * 1000) / 10;
            
            let xGGlobal = Math.round((0 * p0 + 1 * p1 + 2 * p2 + 3 * p3 + 4 * (1 - p0 - p1 - p2 - p3 - 0.02) + 5 * 0.02) * 100) / 100;
            
            let scores = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    scores.push({ i, j, p: Math.round(probA[i] * probB[j]) / 100 });
                }
            }
            scores.sort((a, b) => b.p - a.p);
            let top3 = scores.slice(0, 3);
            
            let diff = offA - offB;
            let vA, vN, vB;
            if (diff > 20) { vA = 75; vN = 18; vB = 7; }
            else if (diff >= 15) { vA = 70; vN = 20; vB = 10; }
            else if (diff >= 10) { vA = 60; vN = 25; vB = 15; }
            else if (diff >= 5) { vA = 50; vN = 30; vB = 20; }
            else if (diff >= 0) { vA = 40; vN = 33; vB = 27; }
            else if (diff >= -4) { vA = 27; vN = 33; vB = 40; }
            else if (diff >= -9) { vA = 20; vN = 30; vB = 50; }
            else if (diff >= -14) { vA = 15; vN = 25; vB = 60; }
            else if (diff >= -20) { vA = 10; vN = 20; vB = 70; }
            else { vA = 7; vN = 18; vB = 75; }
            
            let firstA = Math.round((ouvreA + mtA) / (ouvreA + mtA + ouvreB + mtB) * 100);
            let firstB = 100 - firstA;
            
            let cote1 = Math.round(100 / vA * 100) / 100;
            let coteN = Math.round(100 / vN * 100) / 100;
            let cote2 = Math.round(100 / vB * 100) / 100;
            let coteOver = Math.round(100 / over25 * 100) / 100;
            let coteBTTS = Math.round(100 / btts * 100) / 100;
            
            let highlightA = -1, highlightB = -1;
            for (let k = 0; k < 4; k++) {
                if (Math.abs(probA[k] - encB[k]) <= 5 && probA[k] > 10) highlightA = k;
                if (Math.abs(probB[k] - encA[k]) <= 5 && probB[k] > 10) highlightB = k;
            }
            
            let signal = '';
            let hasSignal = false;
            if (Math.abs(probA[1] - probB[1]) <= 5) {
                let hasBTTS = top3.some(s => (s.i >= 1 && s.j >= 1));
                if (hasBTTS) {
                    signal = `🔵 MIROIR DE MARQUER : Équipe A ${probA[1]}% • Équipe B ${probB[1]}% | Score BTTS dans le top 3`;
                    hasSignal = true;
                }
            }
            
            let html = `
                <div class="xgglobal">🟢 xG GLOBAL : ${xGGlobal.toFixed(2)}</div>
                
                <div class="block">
                    <h3>📊 xG DU MATCH</h3>
                    <p>Équipe A : ${xGA.toFixed(2)} × (${xGAB.toFixed(2)}/2.0) = ${xGadjA.toFixed(2)}<br>
                    Équipe B : ${xGB.toFixed(2)} × (${xGAA.toFixed(2)}/2.0) = ${xGadjB.toFixed(2)}<br>
                    🎯 SCORE PROBABLE : ${scoreA}-${scoreB}</p>
                </div>
                
                <div class="block">
                    <h3>📈 PROBABILITÉS</h3>
                    <p>🏆 1N2 : Équipe A ${vA}% | Nul ${vN}% | Équipe B ${vB}%<br>
                    📈 OVER 2.5 : ${over25}% | ⚽ BTTS : ${btts}%<br>
                    ⏱️ 1ER BUT : Équipe A ${firstA}% | Équipe B ${firstB}%</p>
                </div>
                
                <div class="block">
                    <h3>💰 CÔTES</h3>
                    <p>1 : ${cote1} | N : ${coteN} | 2 : ${cote2} | Over 2.5 : ${coteOver} | BTTS : ${coteBTTS}</p>
                </div>
                
                <div class="block">
                    <h3>🔄 CROISEMENT</h3>
                    <p style="font-size:12px;color:#aaa;">Équipe A</p>
                    <table class="croisement-table">
                        <tr><th>Buts</th><th>Marque</th><th>B encaisse</th><th>Croisement</th></tr>
                        ${[0,1,2,3].map(k => `
                            <tr class="${highlightA === k ? 'highlight-a' : ''}">
                                <td>${k}</td><td>${probA[k]}%</td><td>${encB[k]}%</td><td>${croisA[k]}%</td>
                            </tr>
                        `).join('')}
                    </table>
                    <p style="font-size:12px;color:#aaa;margin-top:10px;">Équipe B</p>
                    <table class="croisement-table">
                        <tr><th>Buts</th><th>Marque</th><th>A encaisse</th><th>Croisement</th></tr>
                        ${[0,1,2,3].map(k => `
                            <tr class="${highlightB === k ? 'highlight-b' : ''}">
                                <td>${k}</td><td>${probB[k]}%</td><td>${encA[k]}%</td><td>${croisB[k]}%</td>
                            </tr>
                        `).join('')}
                    </table>
                    <p style="font-size:11px;margin-top:5px;">🟠 = A trouve chemin dans B | 🔵 = B trouve chemin dans A</p>
                </div>
                
                <div class="block">
                    <h3>🎯 TOP 3 SCORES</h3>
                    <p class="top3">${top3.map(s => `${s.i}-${s.j} : ${(s.p*100).toFixed(1)}%`).join(' | ')}</p>
                </div>
                
                ${hasSignal ? `<div class="signal">${signal}</div>` : ''}
            `;
            
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
