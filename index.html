<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrédictFoot Pro - xG</title>
    <style>
        /* (je mettrai le CSS complet après) */
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ PrédictFoot Pro</h1>
        <p class="sub">Analyse par xG • Formule validée</p>

        <!-- SAISIE -->
        <div class="card">
            <div class="card-title">📊 Équipes</div>
            <div class="grid-2">
                <div>
                    <label>🏠 Équipe A</label>
                    <input type="text" id="nameA" placeholder="Nom" value="POR">
                    <input type="number" id="goalsScoredA" placeholder="Buts marqués" value="1.4" step="0.1">
                    <input type="number" id="goalsConcededA" placeholder="Buts encaissés" value="0.6" step="0.1">
                </div>
                <div>
                    <label>✈️ Équipe B</label>
                    <input type="text" id="nameB" placeholder="Nom" value="UZB">
                    <input type="number" id="goalsScoredB" placeholder="Buts marqués" value="1.0" step="0.1">
                    <input type="number" id="goalsConcededB" placeholder="Buts encaissés" value="1.6" step="0.1">
                </div>
            </div>
            <button id="analyserBtn">🚀 ANALYSER</button>
        </div>

        <!-- RÉSULTATS -->
        <div id="results" style="display:none;">
            <!-- (affiché dynamiquement par JavaScript) -->
        </div>
    </div>

    <script>
        // (logique complète)
    </script>
</body>
</html>
